title: "FileBrowser Quantum has Username Enumeration via Authentication Timing Side-Channel"
description: "The `/api/auth/login` authentication endpoint does not execute in constant
  time. When a non-existent username is supplied, the server returns a `401`/`403`
  response almost immediately. When a valid username is provided, the server performs
  a bcrypt password comparison, causing a measurable delay in the response time."
