title: "Contras Affected by CopyFile Policy Subversion via Symlinks"
description: "The [Kata agent policies](https://docs.edgeless.systems/contrast/architecture/components/policies)
  generated by the Contrast CLI had an issue in the `CopyFile` verification, which
  allowed arbitrary writes to the guest root filesytem. A malicious process on the
  host with the capability to connect to the Kata agent VSOCK could connect to the
  agent and issue a series of `CopyFile` requests to overwrite security-critical files
  or trick the workload into disclosing sensitive data, which effectively amounts
  to a full guest takeover."
