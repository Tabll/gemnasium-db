title: "mercure has Topic Selector Cache Key Collision"
description: "A cache key collision vulnerability in `TopicSelectorStore` allows an
  attacker to poison the match result cache, potentially causing private updates to
  be delivered to unauthorized subscribers or blocking delivery to authorized ones.\n\nThe
  cache key was constructed by concatenating the topic selector and topic with an
  underscore separator:\n\n```go\nk = \"m_\" + topicSelector + \"_\" + topic\n```\n\nBecause
  both topic selectors and topics can contain underscores, two distinct pairs can
  produce the same key:\n\n```\nselector=\"foo_bar\"  topic=\"baz\"     → key: \"m_foo_bar_baz\"\nselector=\"foo\"
  \     topic=\"bar_baz\" → key: \"m_foo_bar_baz\"\n```\n\nAn attacker who can subscribe
  to the hub or publish updates with crafted topic names can exploit this to bypass
  authorization checks on private updates."
