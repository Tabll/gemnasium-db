title: "goshs's public collaborator feed leaks .goshs ACL credentials and enables
  unauthorized access"
description: "goshs leaks file-based ACL credentials through its public collaborator
  feed when the server is deployed without global basic auth. Requests to `.goshs`-protected
  folders are logged before authorization is enforced, and the collaborator websocket
  broadcasts raw request headers, including `Authorization`. An unauthenticated observer
  can capture a victim's folder-specific basic-auth header and replay it to read,
  upload, overwrite, and delete files inside the protected subtree. I reproduced this
  on `v2.0.0-beta.5`, the latest supported release as of April 10, 2026."
