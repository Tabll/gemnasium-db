title: "SFTP root escape via prefix-based path validation in goshs"
description: "goshs contains an SFTP root escape caused by prefix-based path validation.
  An authenticated SFTP user can read from and write to filesystem paths outside the
  configured SFTP root, which breaks the intended jail boundary and can expose or
  modify unrelated server files."
