package_slug: "go/github.com/patrickhener/goshs"
title: "Empty-username SFTP password authentication bypass in goshs"
description: "goshs contains an SFTP authentication bypass when the documented empty-username
  basic-auth syntax is used. If the server is started with `-b ':pass'` together with
  `-sftp`, goshs accepts that configuration but does not install any SFTP password
  handler. As a result, an unauthenticated network attacker can connect to the SFTP
  service and access files without a password. I reproduced this on the latest release
  `v2.0.0-beta.5`."
