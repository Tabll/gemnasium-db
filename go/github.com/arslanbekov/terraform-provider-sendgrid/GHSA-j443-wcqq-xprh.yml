title: "Terraform Provider for SendGrid: TLS Session Resumption Bypasses Certificate
  Authority Trust Store Modifications in Go"
description: "A critical vulnerability has been identified at https://security.snyk.io/package/linux/chainguard:latest/terraform-provider-sendgrid,
  associated with the underlying Go version.\n\nIf the server's TLS configuration
  is mutated between connections — for example, a CA is removed from the trusted list
  via `Config.Clone()` combined with modification or `GetConfigForClient` — the resumed
  handshake still succeeds using the cached session. The certificate is not re-checked
  against the updated CA list.\n\nAs a result, a client whose CA was revoked or removed
  between the first and second connection could still establish a connection on the
  resumed session."
