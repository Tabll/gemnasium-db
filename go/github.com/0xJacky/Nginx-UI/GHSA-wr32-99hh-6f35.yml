title: "Nginx-UI has Server-Side Request Forgery (SSRF) via Cluster Proxy Middleware
  that Allows Access to Internal Services"
description: "An authenticated user can perform Server-Side Request Forgery (SSRF)
  by creating a cluster node pointing to an arbitrary internal URL and then sending
  API requests with the `X-Node-ID` header. The Proxy middleware forwards these requests
  to the attacker-specified internal address, bypassing network segmentation and enabling
  access to services bound to localhost or internal networks."
