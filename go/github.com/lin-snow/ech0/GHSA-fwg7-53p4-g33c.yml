title: "Ech0 Comment Panel Endpoints Missing RequireScopes Middleware — Scoped Access
  Token Bypass"
description: "All 9 comment panel admin endpoints (`/api/panel/comments/*`) are missing
  `RequireScopes()` middleware, while every other admin endpoint in the application
  enforces scope-based authorization on access tokens. An admin-issued access token
  scoped to minimal permissions (e.g., `echo:read` only) can perform full comment
  moderation operations including listing, approving, rejecting, deleting comments,
  and modifying comment system settings."
