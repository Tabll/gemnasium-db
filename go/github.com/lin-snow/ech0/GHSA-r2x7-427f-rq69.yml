title: "Ech0 has SSRF via DNS Resolution Bypass in Webhook URL Validation"
description: "The `validateWebhookURL` function in `webhook_setting_service.go` attempts
  to block webhooks targeting private/internal IP addresses, but only checks literal
  IP strings via `net.ParseIP()`. Hostnames that DNS-resolve to private IPs (e.g.,
  `169.254.169.254.nip.io`, `10.0.0.1.nip.io`) bypass all checks, allowing an admin
  to create webhooks that make server-side requests to internal network services and
  cloud metadata endpoints."
