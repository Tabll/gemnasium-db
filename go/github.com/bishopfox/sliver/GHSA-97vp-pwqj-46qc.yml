package_slug: "go/github.com/bishopfox/sliver"
title: "Sliver Vulnerable to Authenticated OOM via Memory Exhaustion in mTLS/WireGuard
  Transports"
description: "A Remote OOM (Out-of-Memory) vulnerability exists in the Sliver C2 server's
  mTLS and WireGuard C2 transport layer. The `socketReadEnvelope` and `socketWGReadEnvelope` functions
  trust an attacker-controlled 4-byte length prefix to allocate memory, with `ServerMaxMessageSize` allowing
  single allocations of up to **~2 GiB**. A compromised implant or an attacker with
  valid credentials can exploit this by sending fabricated length prefixes over concurrent
  yamux streams (up to 128 per connection), forcing the server to attempt allocating **~256
  GiB** of memory and triggering an OS OOM kill. This crashes the Sliver server, disrupts
  all active implant sessions, and may degrade or kill other processes sharing the
  same host. The same pattern also affects all implant-side readers, which have **no** upper-bound
  check at all.\n\n---"
