package_slug: "go/github.com/bishopfox/sliver"
title: "Sliver: Nil Pointer Dereference in tunnelCloseHandler causes panic when a
  reverse tunnel (rportfwd) close is attempted"
description: "A nil pointer dereference in `tunnelCloseHandler` causes the handler
  goroutine to panic whenever a reverse tunnel (rportfwd) close is attempted. Both
  the legitimate close path AND the unauthorized close path dereference `tunnel.SessionID`
  where `tunnel` is guaranteed nil. This means rportfwd tunnels can never be cleanly
  closed, and any authenticated implant can trigger repeated goroutine panics."
