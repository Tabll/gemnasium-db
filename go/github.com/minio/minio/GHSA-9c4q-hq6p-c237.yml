title: "MinIO has an Unauthenticated Object Write via Missing Signature Verification
  in Unsigned-Trailer Uploads"
description: "_What kind of vulnerability is it? Who is impacted?_\n\nTwo authentication
  bypass vulnerabilities in MinIO's `STREAMING-UNSIGNED-PAYLOAD-TRAILER` code path\nallow
  any user who knows a valid access key to write arbitrary objects to any bucket without
  knowing\nthe secret key or providing a valid cryptographic signature.\n\nAny MinIO
  deployment is impacted. The attack requires only a valid access key (the well-known
  default\n`minioadmin`, or any key with WRITE permission on a bucket) and a target
  bucket name.\n\nThere are two vulnerabilities:\n\n1. Missing Signature Verification
  in PutObjectExtractHandler / Snowball (CWE-306)\n2. Signature Verification Bypass
  via Query-String Credentials (CWE-287)\n\n**Vulnerability 1 — Missing signature
  verification in PutObjectExtractHandler (Snowball)**\n\nWhen `authTypeStreamingUnsignedTrailer`
  support was added (commit 76913a9fd, PR #16484), the new auth\ntype was handled
  in `PutObjectHandler` and `PutObjectPartHandler` but was never added to\n`PutObjectExtractHandler`.
  The snowball auto-extract handler's `switch rAuthType` block has no case for\n`authTypeStreamingUnsignedTrailer`,
  so execution falls through with zero signature verification. The\n`isPutActionAllowed`
  call before the switch extracts the access key and checks IAM permissions, but\ndoes
  not verify the cryptographic signature.\n\nAn attacker sends a PUT request with
  `X-Amz-Content-Sha256: STREAMING-UNSIGNED-PAYLOAD-TRAILER`,\n`X-Amz-Meta-Snowball-Auto-Extract:
  true`, and an `Authorization` header containing a valid access key\nwith a completely
  fabricated signature. The request is accepted and the tar payload is extracted into\nthe
  bucket.\n\n**Affected component:** `cmd/object-handlers.go`, function `PutObjectExtractHandler`.\n\n**Vulnerability
  2 — Signature verification bypass via query-string credentials**\n\n`PutObjectHandler`
  and `PutObjectPartHandler` call `newUnsignedV4ChunkedReader` with a signature\nverification
  gate based solely on the presence of the `Authorization` header:\n\n```go\nnewUnsignedV4ChunkedReader(r,
  true, r.Header.Get(xhttp.Authorization) != \"\")\n```\n\nMeanwhile, `isPutActionAllowed`
  extracts credentials from either the `Authorization` header or the\n`X-Amz-Credential`
  query parameter, and trusts whichever it finds. An attacker omits the\n`Authorization`
  header and supplies credentials exclusively via the query string. The signature
  gate\nevaluates to `false`, `doesSignatureMatch` is never called, and the request
  proceeds with the\npermissions of the impersonated access key.\n\n**Affected components:**
  `cmd/object-handlers.go` (`PutObjectHandler`),\n`cmd/object-multipart-handlers.go`
  (`PutObjectPartHandler`).\n\n**CVSS v4.0 Score:** 8.8 (High)\n\n**Vector:** `CVSS:4.0/AV:N/AC:L/AT:N/PR:N/UI:N/VC:N/VI:H/VA:L/SC:N/SI:N/SA:N`\n\n**CWE:**
  CWE-306 (Missing Authentication for Critical Function), CWE-287 (Improper Authentication)"
