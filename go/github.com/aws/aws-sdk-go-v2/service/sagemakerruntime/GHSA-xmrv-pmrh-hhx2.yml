title: "Denial of Service due to Panic in AWS SDK for Go v2 SDK EventStream Decoder"
description: "An issue exists in the the EventStream header decoder in AWS SDK for
  Go v2 in versions predating [2026-03-23](https://github.com/aws/aws-sdk-go-v2/releases/tag/release-2026-03-23).
  An actor can send a malformed EventStream response frame containing a crafted header
  value type byte outside the valid range, which can cause the host process to terminate.\n\nImpacted
  versions: < [2026-03-23](https://github.com/aws/aws-sdk-go-v2/releases/tag/release-2026-03-23)"
