title: "OliveTin has crash on NPE by calling APIs with invalid bindings or log references"
description: "An unauthenticated attacker can trigger server-side panics by first
  creating an execution log entry with a nil binding via `StartActionByGet` (invalid
  action ID), then calling `KillAction` or `RestartAction` on that tracking ID. This
  causes a nil-pointer dereference in API handlers and results in repeated per-request
  panics (`Empty reply from server`), enabling denial of service through panic/log/CPU
  amplification."
