title: "OliveTin has unauthenticated DoS via concurrent map writes in OAuth2 state
  handling"
description: "An unauthenticated denial-of-service vulnerability exists in OliveTin’s
  OAuth2 login flow. Concurrent requests to /oauth/login can trigger unsynchronized
  access to a shared registeredStates map, causing a Go runtime panic (fatal\nerror:
  concurrent map writes) and process termination. This allows remote attackers to
  crash the service when OAuth2 is enabled."
