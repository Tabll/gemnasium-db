title: "INSATutorat has an authorization bypass vulnerability in its  /api/admin/*
  endpoints"
description: "An authorization bypass vulnerability was discovered in the administration
  pages of the tutoring application. When a standard user (logged in but without administrator
  privileges) attempts to access a resource under /api/admin/, the system detects
  the error but does not block the request.\n\nAs a result, sensitive data is still
  transmitted by the server in the request (GET), and modification actions such as
  campaign creation (POST) are executed successfully despite the FORBIDDEN error message.
  All /api/admin/* endpoints are affected."
