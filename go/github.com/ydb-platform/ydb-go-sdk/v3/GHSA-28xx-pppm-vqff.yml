title: "ydb-go-sdk's transactions are not committed using the `options.WithCommit()`
  option on last call `table.Transaction.Execute` in transaction"
description: "Transactions were NOT committed despite the explicit `options.WithCommit`
  flag using table service client. Because of this, clients did not commit changes
  to the transaction, relying on the fact that the transaction commit was successful.
  This led (in rare cases) to a loss of data consistency."
