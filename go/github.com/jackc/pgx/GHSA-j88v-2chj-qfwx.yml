package_slug: "go/github.com/jackc/pgx"
title: "pgx: SQL Injection via placeholder confusion with dollar quoted string literals"
description: "SQL Injection can occur when:\n\n1. The non-default simple protocol
  is used.\n2. A dollar quoted string literal is used in the SQL query.\n3. That string
  literal contains text that would be would be interpreted as a placeholder outside
  of a string literal.\n4. The value of that placeholder is controllable by the attacker.\n\ne.g.\n\n```go\nattackValue
  := `$tag$; drop table canary; --`\n_, err = tx.Exec(ctx, `select $tag$ $1 $tag$,
  $1`, pgx.QueryExecModeSimpleProtocol, attackValue)\n```\n\nThis is unlikely to occur
  outside of a contrived scenario."
