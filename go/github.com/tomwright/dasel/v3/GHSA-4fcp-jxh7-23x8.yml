title: "Dasel has unbounded YAML alias expansion in dasel leads to CPU/memory denial
  of service"
description: "`dasel`'s YAML reader allows an attacker who can supply YAML for processing
  to trigger extreme CPU and memory consumption. The issue is in the library's own
  `UnmarshalYAML` implementation, which manually resolves alias nodes by recursively
  following `yaml.Node.Alias` pointers without any expansion budget, bypassing go-yaml
  v4's built-in alias expansion limit.\n\nThe issue issue is on `v3.3.1` (`fba653c7f248aff10f2b89fca93929b64707dfc8`)
  and on the current default branch at commit `0dd6132e0c58edbd9b1a5f7ffd00dfab1e6085ad`.
  It is also verified the same code path is present in `v3.0.0` (`648f83baf070d9e00db8ff312febef857ec090a3`).
  A 342-byte payload did not complete within 5 seconds on the test system and exhibited
  unbounded resource growth."
