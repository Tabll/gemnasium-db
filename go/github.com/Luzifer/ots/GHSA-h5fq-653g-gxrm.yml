title: "ots has a negative expire override that can bypass its secret retention policy"
description: "The `/api/create` endpoint accepted negative `expire` query values.
  For the memory storage backend, negative values were passed to secret creation as
  a negative duration and treated as no expiry, allowing callers to create secrets
  that persisted longer than intended."
