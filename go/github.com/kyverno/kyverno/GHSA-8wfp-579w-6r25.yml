package_slug: "go/github.com/kyverno/kyverno"
title: "Kyverno apiCall automatically forwards ServiceAccount token to external endpoints
  (credential leak)"
description: "Kyverno's apiCall service mode automatically attaches the admission
  controller's ServiceAccount (SA) token to outbound HTTP requests. This results in
  unintended credential exposure when requests are sent to external or attacker-controlled
  endpoints.\n\nThe behavior is insecure-by-default and not documented, enabling token
  exfiltration without requiring policy authors to explicitly opt in.\n\n---"
