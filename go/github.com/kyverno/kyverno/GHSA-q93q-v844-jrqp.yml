title: "kyverno apicall servicecall implicit bearer token injection leaks kyverno
  serviceaccount token"
description: "kyverno’s apiCall servicecall helper implicitly injects `Authorization:
  Bearer ...` using the kyverno controller serviceaccount token when a policy does
  not explicitly set an Authorization header. because `context.apiCall.service.url`
  is policy-controlled, this can send the kyverno serviceaccount token to an attacker-controlled
  endpoint (confused deputy).\n\nnamespaced policies are blocked from servicecall
  usage by the namespaced `urlPath` gate in `pkg/engine/apicall/apiCall.go`, so this
  report is scoped to ClusterPolicy and global context usage."
