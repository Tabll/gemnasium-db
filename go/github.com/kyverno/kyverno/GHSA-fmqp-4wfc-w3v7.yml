title: "Kyverno APICall SSRF Vulnerability Leading to Multi-Tenant Isolation Breach"
description: "Kyverno's APICall feature contains a Server-Side Request Forgery (SSRF)
  vulnerability that allows users with Policy creation permissions to access arbitrary
  internal resources through Kyverno's high-privilege ServiceAccount. In multi-tenant
  Kubernetes environments, this constitutes a classic Confused Deputy problem: low-privilege
  tenants can steal sensitive data from other tenants (such as database passwords
  and API keys) and cloud platform IAM credentials, completely breaking tenant isolation.
  This vulnerability does not require cluster-admin privileges and can be exploited
  with only namespace-level Policy creation permissions."
