title: "Daptin has Unauthenticated Path Traversal and Zip Slip"
description: "The `cloudstore.file.upload` action in `server/actions/action_cloudstore_file_upload.go`
  writes user-supplied filenames directly to disk without proper validation.\n\nThis
  allows unauthenticated attackers to perform path traversal and zip slip attacks,
  leading to arbitrary file write and potential remote code execution.\n\n**CVSS Score:**
  10.0 Critical\n**CVSS Vector:** CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:C/C:N/I:H/A:H\n**CWE:**
