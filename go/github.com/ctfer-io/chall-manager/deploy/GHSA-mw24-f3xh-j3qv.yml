title: "Chall-Manager's invalid NetworkPolicy enables a malicious actor to pivot into
  another namespace"
description: "Due to a mis-written NetworkPolicy, a malicious actor can pivot from
  an instance to any Pod out of the origin namespace.\nThis breaks the security-by-default
  property expected as part of the deployment program, leading to a potential lateral
  movement.\nIn the specific case of `sdk/kubernetes.Kompose` it does not isolate
  the instances."
