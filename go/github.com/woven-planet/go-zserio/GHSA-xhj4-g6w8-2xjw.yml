title: "go-zserio has Unbounded Memory Allocation for All Platforms"
description: "When deserializing arrays, strings or bytes (blob) types zserio first
  reads the size of the variable, and then allocates sufficient memory to load data.
  Since the size is always trusted this can be abused by creating a data file with
  a large size value, causing the zserio runtime to allocate large amounts of memory."
