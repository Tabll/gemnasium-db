title: "Unsigned SAML LogoutRequest Acceptance in gosaml2"
description: "The `ValidateEncodedLogoutRequestPOST` function in gosaml2 accepts completely
  unsigned SAML `LogoutRequest` messages even when `SkipSignatureValidation` is set
  to `false`. When `validateElementSignature` returns `dsig.ErrMissingSignature`,
  the code in `decode_logout_request.go:60-62` silently falls through to process the
  unverified XML element instead of rejecting it. An attacker who can reach the SP's
  Single Logout endpoint can forge a `LogoutRequest` for any user, terminating their
  session without possessing the IdP's signing key."
