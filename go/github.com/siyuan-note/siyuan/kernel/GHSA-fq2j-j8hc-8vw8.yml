title: "SiYuan Vulnerable to Arbitrary File Read in Desktop Publish Service"
description: "In SiYuan, `/api/lute/html2BlockDOM` on the desktop copies local files
  pointed to by `file://` links in pasted HTML into the workspace assets directory
  without validating paths against a sensitive-path list. Together with `GET /assets/*path`,
  which only requires authentication, a publish-service visitor can cause the desktop
  kernel to copy any readable sensitive file and then read it via GET, leading to
  exfiltration of sensitive files."
