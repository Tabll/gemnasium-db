title: "SiYuan Vulnerable to Cross-Origin WebSocket Hijacking via Authentication Bypass
  — Unauthenticated Information Disclosure"
description: "SiYuan's WebSocket endpoint (`/ws`) allows unauthenticated connections
  when specific URL parameters are provided (`?app=siyuan&id=auth&type=auth`). This
  bypass, intended for the login page to keep the kernel alive, allows any external
  client — including malicious websites via cross-origin WebSocket — to connect and
  receive all server push events in real-time. These events leak sensitive document
  metadata including document titles, notebook names, file paths, and all CRUD operations
  performed by authenticated users.\n\nCombined with the absence of `Origin` header
  validation, a malicious website can silently connect to a victim's local SiYuan
  instance and monitor their note-taking activity."
