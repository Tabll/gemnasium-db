title: "SiYuan: Publish Reader Path Traversal Delete via `removeUnusedAttributeView`"
description: "SiYuan's publish/read-only boundary can be broken through `/api/av/removeUnusedAttributeView`.\n\nA
  publish-service Reader context can call this endpoint because it is protected only
  by `CheckAuth`, and publish requests are forwarded upstream with a valid `RoleReader`
  JWT. The handler accepts attacker-controlled `id` input and passes it directly into
  a filesystem delete sink:\n\n- no admin check\n- no readonly check\n- no node-ID
  validation\n- no subpath enforcement\n- no verification that the target AV is actually
  unused\n\nBecause the sink builds the file path with:\n\n```go\nfilepath.Join(util.DataDir,
  \"storage\", \"av\", id+\".json\")\n```\n\nan attacker can supply `../` path traversal
  sequences and delete arbitrary `.json` files reachable from the workspace, rather
  than only `data/storage/av/<id>.json`.\n\nThis is a real write/destructive authorization
  bug, not a `visible=false` listing issue."
