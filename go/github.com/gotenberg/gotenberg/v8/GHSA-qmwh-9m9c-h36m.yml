title: "Gotenberg has incomplete fix for ExifTool arbitrary file write: case-insensitive
  bypass and missing HardLink/SymLink tags"
description: "The fix for ExifTool arbitrary file write (commit `043b158`, released
  in v8.29.0) uses a case-sensitive blocklist to filter dangerous pseudo-tags. ExifTool
  processes tag names case-insensitively, so alternate casings bypass the filter.
  The blocklist also omits the `HardLink` and `SymLink` pseudo-tags entirely.\n\nConfirmed
  end-to-end against Gotenberg v8.29.1 via the unauthenticated HTTP API."
