package_slug: "go/github.com/prometheus/prometheus"
title: "Prometheus vulnerable to stored XSS via crafted histogram bucket label values
  in the old web UI heatmap display"
description: "In the Prometheus server's legacy web UI (enabled via the command-line
  flag `--enable-feature=old-ui`), the histogram heatmap chart view does not escape
  `le` label values when inserting them into the HTML for use as axis tick mark labels.\n\nAn
  attacker who can inject crafted metrics (e.g. via a compromised scrape target, remote
  write, or OTLP receiver endpoint) can execute JavaScript in the browser of any Prometheus
  user who views the metric in the heatmap chart UI. From the XSS context, an attacker
  could for example:\n\n- Read `/api/v1/status/config` to extract sensitive configuration
  (although credentials / secrets are redacted by the server)\n- Call `/-/quit` to
  shut down Prometheus (only if `--web.enable-lifecycle` is set)\n- Call `/api/v1/admin/tsdb/delete_series`
  to delete data (only if `--web.enable-admin-api` is set)\n- Exfiltrate metric data
  to an external server\n\nNote that this only affects users who have explicitly enabled
  the legacy Prometheus web UI using the `--enable-feature=old-ui` command-line flag."
