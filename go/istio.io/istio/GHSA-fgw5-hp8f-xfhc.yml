title: "Istio: SSRF via RequestAuthentication jwksUri"
description: "When a RequestAuthentication resource is created with a jwksUri pointing
  to an internal service, istiod makes an unauthenticated HTTP GET request to that
  URL without filtering out localhost or link local ips. This can result in sensitive
  data being distributed to Envoy proxies via xDS configuration.\n\nNote: a partial
  mitigation for this was released in 1.29.1, 128.5, and 1.27.8; however, it was incomplete
  and missed a few codepaths. 1.29.2 and 1.28.6 contain the more robust fix."
