title: "Jackson Core: Document length constraint bypass in blocking, async, and DataInput
  parsers"
description: "Jackson Core 3.x does not consistently enforce `StreamReadConstraints.maxDocumentLength`.
  Oversized JSON documents can be accepted without a `StreamConstraintsException`
  in multiple parser entry points, which allows configured size limits to be bypassed
  and weakens denial-of-service protections."
