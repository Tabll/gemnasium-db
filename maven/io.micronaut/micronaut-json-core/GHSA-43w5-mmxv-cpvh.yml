title: "Micronaut vulnerable to DoS via crafted form-urlencoded body binding with
  descending array indices"
description: "In `JsonBeanPropertyBinder::expandArrayToThreshold` in `io.micronaut:micronaut-json-core`
  before Micronaut 4 4.10.16 and in Micronaut 3 before 3.10.5 does not correctly handle
  descending array index order during form-urlencoded body binding, which allows remote
  attackers to cause a denial of service (non-terminating loop, CPU exhaustion, and
  OutOfMemoryError) via crafted indexed form parameters (e.g., `authors[1].name` followed
  by `authors[0].name`)."
