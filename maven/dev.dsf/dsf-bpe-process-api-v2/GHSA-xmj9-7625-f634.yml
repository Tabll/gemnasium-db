title: "Data Sharing Framework has an Inverted Time Comparison in OIDC JWKS and Token
  Cache"
description: "- The OIDC JWKS and Metadata Document caches used an inverted time comparison
  (`isBefore` instead of `isAfter`), causing the cache to **never return cached values**.
  Every incoming request triggered a fresh HTTP fetch of the OIDC Metadata Document
  and JWKS keys from the OIDC provider.\n- The OIDC token cache for the [FHIR client
  connections](https://dsf.dev/operations/v2.1.0/bpe/fhir-client-connections.html)
  used an inverted time comparison (`isBefore` instead of `isAfter`), causing the
  cache to **never invalidate**. Every incoming request returned the same OIDC token
  even if expired."
