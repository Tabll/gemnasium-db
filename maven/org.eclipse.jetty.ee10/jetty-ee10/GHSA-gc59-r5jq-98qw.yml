title: "Duplicate Advisory: Eclipse Jetty: Early return from the JASPIAuthenticator
  code can potentially no clear ThreadLocal variables"
description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-r7p8-xq5m-436c. This link is maintained to preserve external
  references.\n\n## Original Description\nIn Eclipse Jetty, the class JASPIAuthenticator
  initiates the authentication checks, which set two ThreadLocal variable.\n\n\nUpon
  returning from the initial checks, there are conditions that cause an early return
  from the JASPIAuthenticator code without clearing those ThreadLocals.\n\n\nA subsequent
  request using the same thread inherits the ThreadLocal values, leading to a broken
  access control and privilege escalation."
