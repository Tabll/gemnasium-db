title: "jdbi3-freemarker Vulnerable to Improper Neutralization of Special Elements
  Used in FreeMarker Template Engine"
description: "**Description**\n\nAn Improper Neutralization of Special Elements Used
  in a Template Engine (CWE-1336) vulnerability in Jdbi allows arbitrary command execution
  when an application using `jdbi3-freemarker` permits attacker-influenced text to
  reach `FreemarkerEngine.parse()` as template source. This affects `org.jdbi:jdbi3-freemarker`
  through version 3.52.1.\n\nThe developer opts into FreeMarker-backed SQL templating,
  but does not explicitly opt into reflective Java class loading from template source.\n\nJdbi’s
  FreeMarker integration should not expose unrestricted Java class instantiation by
  default in a SQL templating module. While the SQL injection risk is acknowledged,
  Jdbi’s documentation explicitly supports and demonstrates dynamic SQL templating
  through defined attributes, including substitution of non-bindable SQL elements
  such `ORDER BY` columns."
