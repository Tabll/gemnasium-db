title: "OpenRemote has XXE in Velbus Asset Import"
description: "The Velbus asset import path parses attacker-controlled XML without
  explicit XXE hardening. An authenticated user who can call the import endpoint may
  trigger XML external entity processing, which can lead to server-side file disclosure
  and SSRF. The target file must be less than 1023 characters."
