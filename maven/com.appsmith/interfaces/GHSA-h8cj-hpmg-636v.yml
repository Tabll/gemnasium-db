title: "appsmith has SQL Injection in FilterDataService via Unsafe DROP TABLE Execution"
description: "A SQL injection vulnerability exists in `FilterDataServiceCE.java` where
  the `dropTable` method constructs a SQL `DROP TABLE` statement using string concatenation
  with the table name. If the table name is derived from user input, this allows for
  arbitrary SQL command execution."
