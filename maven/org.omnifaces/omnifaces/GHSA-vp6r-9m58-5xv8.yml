title: "OmniFaces: EL injection via crafted resource name in wildcard CDN mapping"
description: "Server-side EL injection leading to Remote Code Execution (RCE). Affects
  applications that use `CDNResourceHandler` with a wildcard CDN mapping (e.g. `libraryName:*=https://cdn.example.com/*`).
  An attacker can craft a resource request\nURL containing an EL expression in the
  resource name, which is evaluated server-side.\n\nThe severity depends on the EL
  implementation and the objects available in the EL context. In the worst case this
  leads to Remote Code Execution (RCE). At minimum it allows information disclosure
  and denial of service.\n\nApplications using `CDNResourceHandler` without wildcard
  mappings (i.e. only explicit resource-to-URL mappings) are **not** affected."
