package_slug: "maven/com.splunk/splunk-otel-javaagent"
title: "splunk-otel-javaagent: Unsafe deserialization in RMI instrumentation may lead
  to Remote Code Execution"
description: "In versions prior to 2.26.1, the RMI instrumentation registered a custom
  endpoint that deserialized incoming data without applying serialization filters.
  An attacker with network access to a JMX or RMI port on an instrumented JVM could
  exploit this to potentially achieve remote code execution. All three of the following
  conditions must be true to exploit this vulnerability:\n1. Splunk Distribution of
  OpenTelemetry Java is attached as a Java agent (`-javaagent`)\n2. An RMI endpoint
  is network-reachable (e.g. JMX remote port, an RMI registry, or any application-exported
  RMI service)\n3. A gadget-chain-compatible library is present on the classpath"
