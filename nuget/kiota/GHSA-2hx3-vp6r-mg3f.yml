title: "Kiota: Code Generation Literal Injection"
description: "Kiota versions **prior to 1.31.1** are affected by a code-generation
  literal injection vulnerability in multiple writer sinks (for example: serialization/deserialization
  keys, path/query parameter mappings, URL template metadata, enum/property metadata,
  and default value emission).\n\nWhen malicious values from an OpenAPI description
  are emitted into generated source without context-appropriate escaping, an attacker
  can break out of string literals and inject additional code into generated clients."
