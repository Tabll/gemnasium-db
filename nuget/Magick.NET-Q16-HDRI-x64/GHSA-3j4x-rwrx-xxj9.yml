title: "mageMagick has a possible use-after-free write in its PDB decoder"
description: "A use-after-free vulnerability exists in the PDB decoder that will use
  a stale pointer when a memory allocation fails and that could result in a crash
  or a single zero byte write.\n\n```\n==4033155==ERROR: AddressSanitizer: UNKNOWN
  SIGNAL on unknown address 0x000000000000 (pc 0x5589c1971b24 bp 0x7ffdcc7ae2d0 sp
  0x7ffdcc7adb20 T0)\n```\n\n```\n==4034812==ERROR: AddressSanitizer: heap-use-after-free
  on address 0x7f099e9f7800 at pc 0x5605d909ab20 bp 0x7ffe52045b50 sp 0x7ffe52045b40\nWRITE
  of size 1 at 0x7f099e9f7800 thread T0\n```"
