title: "Scriban: Sandbox escape due to TypedObjectAccessorcache bypassing MemberFilter
  after TemplateContext reuse"
description: "`TemplateContext` caches type accessors by `Type` only, but those accessors
  are built using the current `MemberFilter` and `MemberRenamer`. When a `TemplateContext`
  is reused and the filter is tightened for a later render, Scriban still reuses the
  old accessor and continues exposing members that should now be hidden."
