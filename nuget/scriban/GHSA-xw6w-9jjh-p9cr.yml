title: "Scriban has Multiple Denial-of-Service Vectors via Unbounded Resource Consumption
  During Expression Evaluation"
description: "Scriban's expression evaluation contains three distinct code paths that
  allow an attacker who can supply a template to cause denial of service through unbounded
  memory allocation or CPU exhaustion. The existing safety controls (`LimitToString`,
  `LoopLimit`) do not protect these paths, giving applications a false sense of safety
  when evaluating untrusted templates."
