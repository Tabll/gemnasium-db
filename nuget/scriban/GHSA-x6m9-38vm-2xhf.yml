title: "Scriban has an authorization bypass due to stale include cache surviving TemplateContext.Reset() "
description: "`TemplateContext.Reset()` claims that a `TemplateContext` can be reused
  safely on the same thread, but it does not clear `CachedTemplates`. If an application
  pools `TemplateContext` objects and uses an `ITemplateLoader` that resolves content
  per request, tenant, or user, a previously authorized include can be served to later
  renders without calling `TemplateLoader.Load()` again."
