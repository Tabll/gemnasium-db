title: "Scriban has Uncontrolled Recursion in `object.to_json` Causing Unrecoverable
  Process Crash via StackOverflowException"
description: "The `object.to_json` builtin function in Scriban performs recursive
  JSON serialization via an internal `WriteValue()` static local function that has
  no depth limit, no circular reference detection, and no stack overflow guard. A
  Scriban template containing a self-referencing object passed to `object.to_json`
  triggers unbounded recursion, causing a `StackOverflowException` that terminates
  the hosting .NET process. This is a fatal, unrecoverable crash — `StackOverflowException`
  cannot be caught by user code in .NET."
