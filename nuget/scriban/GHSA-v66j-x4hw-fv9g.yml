package_slug: "nuget/scriban"
title: "Scriban: Uncontrolled Memory Allocation via string.pad_left/pad_right Allows
  Remote Denial of Service"
description: "The built-in `string.pad_left` and `string.pad_right` template functions
  in Scriban perform no validation on the `width` parameter, allowing a template expression
  to allocate arbitrarily large strings in a single call. When Scriban is exposed
  to untrusted template input — as in the official Scriban.AppService playground deployed
  on Azure — an unauthenticated attacker can trigger ~1GB memory allocations with
  a 39-byte payload, crashing the service via `OutOfMemoryException`."
