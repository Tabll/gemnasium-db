title: "PraisonAI has Memory State Leakage and Path Traversal in MultiAgent Context
  Handling"
description: "The `MultiAgentLedger` and `MultiAgentMonitor` components in the provided
  code exhibit vulnerabilities that can lead to context leakage and arbitrary file
  operations. Specifically:\n1. **Memory State Leakage via Agent ID Collision**: The
  `MultiAgentLedger` uses a dictionary to store ledgers by agent ID without enforcing
  uniqueness. This allows agents with the same ID to share ledger instances, leading
  to potential leakage of sensitive context data.\n2. **Path Traversal in MultiAgentMonitor**:
  The `MultiAgentMonitor` constructs file paths by concatenating the `base_path` and
  agent ID without sanitization. This allows an attacker to escape the intended directory
  using path traversal sequences (e.g., `../`), potentially leading to arbitrary file
  read/write."
