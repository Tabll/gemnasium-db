title: "PraisonAI: SQL Injection via unvalidated `table_prefix` in 9 conversation
  store backends (incomplete fix for CVE-2026-40315)"
description: "The fix for [CVE-2026-40315](https://github.com/MervinPraison/PraisonAI/security/advisories/GHSA-x783-xp3g-mqhp)
  added input validation to `SQLiteConversationStore` only. Nine sibling backends
  — MySQL, PostgreSQL, async SQLite/MySQL/PostgreSQL, Turso, SingleStore, Supabase,
  SurrealDB — pass `table_prefix` straight into f-string SQL. Same root cause, same
  code pattern, same exploitation. 52 unvalidated injection points across the codebase.\n\n`postgres.py`
  additionally accepts an unvalidated `schema` parameter used directly in DDL."
