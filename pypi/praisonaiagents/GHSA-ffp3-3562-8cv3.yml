package_slug: "pypi/praisonaiagents"
title: "PraisonAI: Coarse-Grained Tool Approval Cache Bypasses Per-Invocation Consent
  for Shell Commands"
description: "The approval system in PraisonAI Agents caches tool approval decisions
  by tool name only, not by invocation arguments. Once a user approves `execute_command`
  for any command (e.g., `ls -la`), all subsequent `execute_command` calls in that
  execution context bypass the approval prompt entirely. Combined with `os.environ.copy()`
  passing all process environment variables to subprocesses, this allows an LLM agent
  (potentially via prompt injection) to silently exfiltrate API keys and credentials
  without further user consent."
