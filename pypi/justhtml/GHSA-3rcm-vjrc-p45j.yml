title: "JustHTML has a Sanitizer Bypass (in Markdown)"
description: "`to_markdown()` does not sufficiently escape text content that looks
  like HTML. As a result, untrusted input that is safe in `to_html()` can become raw
  HTML in Markdown output.\n\nThis is not specific to tokenizer raw-text states like
  `<title>`, `<noscript>`, or `<plaintext>`, although those states can trigger the
  behavior. The root cause is broader: Markdown text serialization leaves angle brackets
  unescaped in text nodes."
