title: "Tornado has incomplete validation of cookie attributes"
description: "Values passed to the `domain`, `path`, and `samesite` arguments of `RequestHandler.set_cookie`
  were not completely validated in versions of Tornado prior to 6.5.5. In particular,
  semicolons would be allowed, which could be used to inject attacker-controlled values
  for other cookie attributes."
