title: "SageMaker Python SDK replaced eval() with safe parser in JumpStart search
  functionality"
description: "This advisory addresses the use of the search_hub() function within
  the SageMaker Python SDK's JumpStart search functionality. An actor with the ability
  to control query parameters passed to the search_hub() function could potentially
  provide malformed input that causes the eval() function to execute arbitrary commands,
  access sensitive data, or compromise the execution environment.\n\nA defense-in-depth
  enhancement has been implemented to replace code evaluation with safe string operations
  when processing search query parameters. This enhancement removes the use of eval()
  from the execution path, replacing it with a safe recursive descent parser. The
  change was released in SageMaker Python SDK version 3.4.0 on January 23, 2026. This
  advisory is informational to help customers understand their responsibilities regarding
  input validation and configuration security under the [AWS Shared Responsibility
  Model](https://aws.amazon.com/compliance/shared-responsibility-model/)."
