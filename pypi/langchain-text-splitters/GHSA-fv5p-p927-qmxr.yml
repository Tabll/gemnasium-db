title: "LangChain Text Splitters: HTMLHeaderTextSplitter.split_text_from_url SSRF
  Redirect Bypass"
description: "`HTMLHeaderTextSplitter.split_text_from_url()` validated the initial
  URL using `validate_safe_url()` but then performed the fetch with `requests.get()`
  with redirects enabled (the default). Because redirect targets were not revalidated,
  a URL pointing to an attacker-controlled server could redirect to internal, localhost,
  or cloud metadata endpoints, bypassing SSRF protections.\n\nThe response body is
  parsed and returned as `Document` objects to the calling application code. Whether
  this constitutes a data exfiltration path depends on the application: if it exposes
  Document contents (or derivatives) back to the requester who supplied the URL, sensitive
  data from internal endpoints could be leaked. Applications that store or process
  Documents internally without returning raw content to the requester are not directly
  exposed to data exfiltration through this issue."
