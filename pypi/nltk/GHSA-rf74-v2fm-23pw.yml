description: "`JSONTaggedDecoder.decode_obj()` in `nltk/jsontags.py` calls itself\nrecursively
  without any depth limit. A deeply nested JSON structure\nexceeding `sys.getrecursionlimit()`
  (default: 1000) will raise an\nunhandled `RecursionError`, crashing the Python process."
