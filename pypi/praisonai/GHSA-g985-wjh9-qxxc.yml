title: "PraisonAI Vulnerable to RCE via Automatic tools.py Import"
description: "PraisonAI automatically imports `./tools.py` from the current working
  directory when launching certain components. This includes call.py, tool_resolver.py,
  and CLI tool-loading paths.\n\nA malicious tools.py placed in the process working
  directory is executed immediately, allowing arbitrary Python code execution in the
  host environment."
