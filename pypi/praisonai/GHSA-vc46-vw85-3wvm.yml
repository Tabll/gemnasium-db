title: "PraisonAI has critical RCE via `type: job` workflow YAML"
description: "`praisonai workflow run <file.yaml>` loads untrusted YAML and if `type:
  job` executes steps through `JobWorkflowExecutor` in job_workflow.py.\n\nThis supports:\n-
  `run:` → shell command execution via `subprocess.run()`\n- `script:` → inline Python
  execution via `exec()`\n- `python:` → arbitrary Python script execution\n\nA malicious
  YAML file can execute arbitrary host commands."
