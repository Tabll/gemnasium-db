title: "fickling modules linecache, difflib and gc are missing from the unsafe modules
  blocklist"
description: "Two independent bugs in fickling's AST-based static analysis combine
  to allow a malicious pickle file to execute arbitrary stdlib function calls - including
  reading sensitive files - while check_safety() returns Severity.LIKELY_SAFE and
  fickling.load() completes without raising UnsafeFileError.\n\nA server using fickling.load()
  as a security gate before deserializing untrusted pickle data (its documented use
  case) is fully bypassed. The attacker receives the contents of any file readable
  by the server process as the return value of fickling.load()."
