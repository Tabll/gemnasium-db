title: "Fickling missing RCE-capable modules in UNSAFE_IMPORTS"
description: "fickling's `UNSAFE_IMPORTS` blocklist is missing at least 3 stdlib modules
  that provide direct arbitrary command execution: `uuid`, `_osx_support`, and `_aix_support`.
  These modules contain functions that internally call `subprocess.Popen()` or `os.system()`
  with attacker-controlled arguments. A malicious pickle file importing these modules
  passes both `UnsafeImports` and `NonStandardImports` checks."
