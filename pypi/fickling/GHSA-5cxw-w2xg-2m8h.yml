package_slug: "pypi/fickling"
title: "fickling's `platform` module subprocess invocation evades `check_safety()`
  with `LIKELY_SAFE`"
description: "A crafted pickle invoking `platform._syscmd_file`, `platform.architecture`,
  or `platform.libc_ver` passes `check_safety()` with `Severity.LIKELY_SAFE` and zero
  findings. During `fickling.loads()`, these functions invoke `subprocess.check_output`
  with attacker-controlled arguments or read arbitrary files from disk.\n\n**Clarification:**
  The subprocess call uses a list argument (`['file', '-b', target]`), not `shell=True`,
  so the attacker controls the file path argument to the `file` command, not the command
  itself. The impact is subprocess invocation with attacker-controlled arguments and
  information disclosure (file type probing), not arbitrary command injection."
