package_slug: "pypi/fickling"
title: "Fickling has safety check bypass via REDUCE+BUILD opcode sequence"
description: "All 5 of fickling's safety interfaces — `is_likely_safe()`, `check_safety()`,
  CLI `--check-safety`, `always_check_safety()`, and the `check_safety()` context
  manager — report `LIKELY_SAFE` / raise no exceptions for pickle files that call
  dangerous top-level stdlib functions (signal handlers, network servers, network
  connections, file operations) when the REDUCE opcode is followed by a BUILD opcode.
  Demonstrated impacts include backdoor network listeners (`socketserver.TCPServer`),
  process persistence (`signal.signal`), outbound data exfiltration (`smtplib.SMTP`),
  and file creation on disk (`sqlite3.connect`). An attacker can append a trivial
  BUILD opcode to any payload to eliminate all detection."
