title: "XSS Vulnerability in Markdown Editor"
description: "InvenTree uses [EasyMDE](https://github.com/Ionaru/easy-markdown-editor)
  for displaying markdown text in various places (e.g. for the various \"notes\" fields
  associated with various models).\n\nBy default, EasyMDE does not sanitize input
  data, and it is possible for malicious code to be injected into the markdown editor,
  and executed in the users browser.\n\n*Note: This malicious data must be first uploaded
  to the database by an authorized user, so the risk here is limited to trusted users*"
