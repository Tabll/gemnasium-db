title: "web3.py: SSRF via CCIP Read (EIP-3668) OffchainLookup URL handling"
description: "web3.py implements CCIP Read / `OffchainLookup` (EIP-3668) by performing
  HTTP requests to URLs supplied by smart contracts in `offchain_lookup_payload[\"urls\"]`.
  The implementation uses these contract-supplied URLs directly (after `{sender}`
  / `{data}` template substitution) without any destination validation:\n\n- No restriction
  to `https://` (and no opt-in gate for `http://`)\n- No hostname or IP allowlist\n-
  No blocking of private/reserved IP ranges (loopback, link-local, RFC1918)\n- No
  redirect target validation (both `requests` and `aiohttp` follow redirects by default)\n\n**CCIP
  Read is enabled by default** (`global_ccip_read_enabled = True` on all providers),
  meaning any application using web3.py's `.call()` method is exposed without explicit
  opt-in.\n\nThis results in **Server-Side Request Forgery (SSRF)** when web3.py is
  used in backend services, indexers, APIs, or any environment that performs `eth_call`
  / `.call()` against untrusted or user-supplied contract addresses. A malicious contract
  can force the web3.py process to issue HTTP requests to arbitrary destinations,
  including internal network services and cloud metadata endpoints.\n\n---"
