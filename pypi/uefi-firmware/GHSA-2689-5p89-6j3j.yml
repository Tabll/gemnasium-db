package_slug: "pypi/uefi-firmware"
title: "UEFI Firmware Parser has a stack out-of-bounds write in tiano decompressor
  MakeTable"
description: "`uefi-firmware` contains a stack out-of-bounds write vulnerability in
  the native tiano/EFI decompressor. in `uefi_firmware/compression/Tiano/Decompress.c`,
  `MakeTable()` does not validate that bit-length values read from the compressed
  bitstream are within the expected range (`0..16`). a crafted firmware blob can supply
  bit lengths greater than `16`, causing out-of-bounds writes to the stack-allocated
  `Count[17]` array and related decode tables.\n\nreachability is through the normal
  parsing path: `CompressedSection.process()` -> `efi_compressor.TianoDecompress()`
  -> `TianoDecompress()` -> `ReadPTLen()` -> `MakeTable()`.\n\nMinimum impact is a
  deterministic crash; depending on build/runtime details, the stack memory corruption
  may be exploitable for code execution in the context of the parsing process. this
  project shipped its own copy of the decompressor without the upstream EDK2 hardening
  for this bug class.\n\nReferences:\n\n- PR: <https://github.com/theopolis/uefi-firmware-parser/pull/145>\n-
  fix commit: <https://github.com/theopolis/uefi-firmware-parser/commit/bf3dfaa8a05675bae6ea0cbfa082ddcebfcde23e>\n-
  upstream related fixes: CVE-2017-5731, CVE-2017-5732, CVE-2017-5733, CVE-2017-5734,
  CVE-2017-5735"
