title: "MONAI: Unsafe functions lead to pickle deserialization rce"
description: "The `algo_from_pickle` function in `monai/auto3dseg/utils.py` causes
  `pickle.loads(data_bytes)` to be executed, and it does not perform any validation
  on the input parameters. This ultimately leads to insecure deserialization and can
  result in code execution vulnerabilities."
