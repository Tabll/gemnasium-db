title: "LangChain has incomplete f-string validation in prompt templates"
description: "LangChain's f-string prompt-template validation was incomplete in two
  respects.\n\nFirst, some prompt template classes accepted f-string templates and
  formatted them without enforcing the same attribute-access validation as `PromptTemplate`.
  In particular, `DictPromptTemplate` and `ImagePromptTemplate` could accept templates
  containing attribute access or indexing expressions and subsequently evaluate those
  expressions during formatting.\n\nExamples of the affected shape include:\n\n```python\n\"{message.additional_kwargs[secret]}\"\n\"https://example.com/{image.__class__.__name__}.png\"\n```\n\nSecond,
  f-string validation based on parsed top-level field names did not reject nested
  replacement fields inside format specifiers. For example:\n\n```python\n\"{name:{name.__class__.__name__}}\"\n```\n\nIn
  this pattern, the nested replacement field appears in the format specifier rather
  than in the top-level field name. As a result, earlier validation based on parsed
  field names did not reject the template even though Python formatting would still
  attempt to resolve the nested expression at runtime."
