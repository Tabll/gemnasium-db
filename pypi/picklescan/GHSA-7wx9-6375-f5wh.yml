package_slug: "pypi/picklescan"
title: "PickleScan's profile.run blocklist mismatch allows exec() bypass"
description: "picklescan v1.0.3 blocks `profile.Profile.run` and `profile.Profile.runctx`
  but does NOT block the module-level `profile.run()` function. A malicious pickle
  calling `profile.run(statement)` achieves arbitrary code execution via `exec()`
  while picklescan reports 0 issues. This is because the blocklist entry `\"Profile.run\"`
  does not match the pickle global name `\"run\"`."
