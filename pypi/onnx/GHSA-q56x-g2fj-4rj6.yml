title: "ONNX: TOCTOU arbitrary file read/write in save_external_dat "
description: "The `save_external_data` method seems to include multiple issues introducing
  a local TOCTOU vulnerability, an arbitrary file read/write on any system. It potentially
  includes a path validation bypass on Windows systems.\nRegarding the TOCTOU, an
