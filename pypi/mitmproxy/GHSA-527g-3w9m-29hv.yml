title: "LDAP Injection in mitmproxy"
description: "In mitmproxy 12.2.1 and below, the builtin LDAP proxy authentication
  does not correctly sanitize the username when querying the LDAP server. This allows
  a malicious client to bypass authentication.\n\nOnly mitmproxy instances using the
  `proxyauth` option with LDAP are affected. This option is not enabled by default."
