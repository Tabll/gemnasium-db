title: "skia-python vendors vulnerable libfreetype because of pinned cibuildwheel
  version"
description: "The Linux wheels for skia-python vendor a vulnerable version of\nlibfreetype
  that is affected by CVE-2025-27363 [1].\n\nThe root cause is a chain of unfortunate
  events:\n\n1. skia-python builds wheels using pinned pypa/cibuildwheel@2.21.3 [2]\n\n2.
  cibuildwheel 2.21.3 in turn pins manylinux container images [3]\n\n3. In these images,
  version 2.9.1-9.el8 of RedHat package freetype is\n*preinstalled*. This package
  version is vulnerable and has since been\npatched in 2.9.1-10.\n\n4. During the
  skia-python Linux build, libfreetype is vendored from the\nsystem, resulting in
  skia-python.libs/libfreetype-29a7443c.so.6.16.1\n\n[ To find the provenance of your
  vendored libfreetype, we extracted the\n8-character hash of the original binary
  file that is added during the\nbuild process (29a7443c), and matched it against
  our database of hashes\nall historic Red Hat, Debian and Ubuntu releases of freetype.
  ]\n\n5. Because freetype is only a *transitive* dependency of the packages\nexplicitly
  installed by the build script [4], it is not upgraded to the\npatched version [4].\n\n5.
  As a result, the published wheels embed a vulnerable libfreetype,\neven though patched
  packages are available upstream.\n\nThis appears to be a broader manylinux ecosystem
  issue. The base images\ndo not enforce that `yum update` runs on container start,
  so\npreinstalled libraries may remain vulnerable indefinitely."
