title: "Dagster Vulnerable to SQL Injection via Dynamic Partition Keys in Database
  I/O Manager Integrations"
description: "The DuckDB, Snowflake, BigQuery, and DeltaLake I/O managers constructed
  SQL WHERE clauses by interpolating dynamic partition key values into queries without
  escaping. A user with the `Add Dynamic Partitions` permission could create a partition
  key that injects arbitrary SQL, which would execute against the target database
  backend under the I/O manager's credentials.\n\nOnly deployments that use dynamic
  partitions are affected. Pipelines using static or time-window partitions are not
  impacted."
