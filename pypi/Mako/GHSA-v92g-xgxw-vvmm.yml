title: "Mako: Path traversal via double-slash URI prefix in TemplateLookup"
description: "`TemplateLookup.get_template()` is vulnerable to path traversal when
  a URI starts with `//` (e.g., `//../../../secret.txt`). The root cause is an inconsistency
  between two slash-stripping implementations:\n\n- `Template.__init__` strips **one**
  leading `/` using `if`/slice\n- `TemplateLookup.get_template()` strips **all** leading
  `/` using `re.sub(r\"^\\/+\", \"\")`\n\nWhen a URI like `//../../../../etc/passwd`
  is passed:\n1. `get_template()` strips all `/` → `../../../../etc/passwd` → file
  found via `posixpath.join(dir_, u)`\n2. `Template.__init__` strips one `/` → `/../../../../etc/passwd`
  → `normpath` → `/etc/passwd`\n3. `/etc/passwd`.startswith(`..`) → `False` → **check
  bypassed**"
