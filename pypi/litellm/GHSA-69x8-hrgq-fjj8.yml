title: "LiteLLM: Password hash exposure and pass-the-hash authentication bypass"
description: "Three issues combine into a full authentication bypass chain:\n\n1.
  Weak hashing: User passwords are stored as unsalted SHA-256 hashes, making them
  vulnerable to rainbow table attacks and trivially identifying users with identical
  passwords.\n2. Hash exposure: Multiple API endpoints (/user/info, /user/update,
  /spend/users) return the password hash field in responses to any authenticated user
  regardless of role. Plaintext passwords could also potentially be exposed in certain
  scenarios.\n4. Pass-the-hash: The /v2/login endpoint accepts the raw SHA-256 hash
  as a valid password without re-hashing, allowing direct login with a stolen\n\nAn
  already authenticated user can retrieve another user's password hash from the API
  and use it to log in as that user. This enables full privilege escalation in three
  HTTP requests."
