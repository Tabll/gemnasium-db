title: "n8n: Authenticated XSS and Open Redirect via Form Node"
description: "An authenticated user with permission to create or modify workflows
  could configure a Form Node with an unsanitized HTML description field or exploit
  an overly permissive iframe sandbox policy to perform stored cross-site scripting
  or redirect end users visiting the form to an arbitrary external URL. The vulnerability
  could be used to facilitate phishing attacks."
