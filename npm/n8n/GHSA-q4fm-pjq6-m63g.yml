title: "n8n has a Stored XSS Vulnerability in its Form Trigger"
description: "An authenticated user with permission to create or modify workflows
  could exploit a flaw in the Form Trigger node's CSS sanitization to store a cross-site
  scripting (XSS) payload. The injected script executes persistently for every visitor
  of the published form, enabling form submission hijacking and phishing. The existing
  Content Security Policy prevents direct n8n session cookie theft but does not prevent
  script execution or form action manipulation."
