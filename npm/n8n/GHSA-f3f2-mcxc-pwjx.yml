title: "n8n: SQL Injection in MySQL, PostgreSQL, and Microsoft SQL nodes"
description: "An authenticated user with permission to create or modify workflows
  and access to a database credential could unknowingly create a workflow that was
  vulnerable to SQL injection, even while expecting inputs to be handled safely through
  escaped parameters. By supplying specially crafted table or column names, an attacker
  could inject arbitrary SQL because the MySQL, PostgreSQL, and Microsoft SQL nodes
  did not escape identifier values when constructing queries, enabling injection through
  node configuration parameters."
