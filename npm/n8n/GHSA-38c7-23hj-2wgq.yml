title: "n8n has Webhook Forgery on Zendesk Trigger Node"
description: "An attacker who knows the webhook URL of a workflow using the ZendeskTrigger
  node could send unsigned POST requests and trigger the workflow with arbitrary data.
  The node does not verify the HMAC-SHA256 signature that Zendesk attaches to every
  outbound webhook, allowing any party to inject crafted payloads into the connected
  workflow."
