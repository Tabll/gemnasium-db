title: "n8n has an SSO Enforcement Bypass in its Self-Service Settings API"
description: "An authenticated user signed in through Single Sign-On (SSO) could disable
  SSO enforcement for their own account through the n8n API. This allowed the user
  to create a local password and authenticate directly with email and password, completely
  bypassing the organization's SSO policy, centralized identity management, and any
  identity-provider-enforced multi-factor authentication."
