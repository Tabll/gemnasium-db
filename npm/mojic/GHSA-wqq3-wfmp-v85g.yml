title: "Mojic: Observable Timing Discrepancy in HMAC Verification"
description: "The `CipherEngine` in Mojic v2.1.3 uses a standard equality operator
  (`!==`) to verify the HMAC-SHA256 integrity seal during the decryption phase. This
  creates an Observable Timing Discrepancy (CWE-208), allowing a potential attacker
  to bypass the file integrity check via a timing attack."
