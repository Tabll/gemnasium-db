title: "Flowise: Unauthenticated TTS endpoint accepts arbitrary credential IDs — enables
  API credit abuse via stored credentials"
description: "The text-to-speech generation endpoint (`POST /api/v1/text-to-speech/generate`)
  is `whitelist`ed (no auth) and accepts a `credentialId` directly in the request
  body. When called without a `chatflowId`, the endpoint uses the provided `credentialId`
  to decrypt the stored credential (e.g., OpenAI or ElevenLabs API key) and generate
  speech."
