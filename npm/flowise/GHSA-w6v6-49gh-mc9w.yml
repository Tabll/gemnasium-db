title: "Flowise: Path Traversal in Vector Store basePath"
description: "The Faiss and SimpleStore (LlamaIndex) vector store implementations
  accept a `basePath` parameter from user-controlled input and pass it directly to
  filesystem write operations without any sanitization. An authenticated attacker
  can exploit this to write vector store data to arbitrary locations on the server
  filesystem."
