title: "Flowise: Remote code execution vulnerability in AirtableAgent.ts caused by
  lack of input verification when using `Pandas`."
description: "“AirtableAgent” is an agent function provided by FlowiseAI that retrieves
  search results by accessing private datasets from airtable.com. “AirtableAgent”
  uses Python, along with `Pyodide` and `Pandas`, to get and return results.\n\nThe
  user’s input is directly applied to the question parameter within the prompt template
  and it is reflected to the Python code without any sanitization.\n\n**The point
  is that an attacker can bypass the intended behavior of the LLM and trigger Remote
  Code Execution through a simple prompt injection.**"
