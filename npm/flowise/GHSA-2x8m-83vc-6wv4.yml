title: "Flowise: SSRF Protection Bypass (TOCTOU & Default Insecure)"
description: "The core security wrappers (secureAxiosRequest and secureFetch) intended
  to prevent Server-Side Request Forgery (SSRF) contain multiple logic flaws. These
  flaws allow attackers to bypass the allow/deny lists via DNS Rebinding (Time-of-Check
  Time-of-Use) or by exploiting the default configuration which fails to enforce any
  deny list."
