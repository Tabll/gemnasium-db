title: "Flowise: SSRF Protection Bypass via Direct node-fetch / axios Usage (Patch
  Enforcement Failure)"
description: "Flowise introduced SSRF protections through a centralized HTTP security
  wrapper (`httpSecurity.ts`) that implements deny-list validation and IP pinning
  logic.\n\nHowever, multiple tool implementations directly import and invoke raw
  HTTP clients (`node-fetch`, `axios`Instead of using the secured wrapper.\n\nBecause
  enforcement is neither mandatory nor centralized, these tools bypass SSRF mitigation
  entirely, restoring full SSRF capability even after the patch.\n\nThis issue is
  distinct from specification trust issues and represents incomplete mitigation of
  previously addressed SSRF vulnerabilities."
