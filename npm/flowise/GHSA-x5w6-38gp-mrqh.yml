title: "Flowise: Password Reset Link Sent Over Unsecured HTTP"
description: "**Summary:**\nThe password reset functionality on [cloud.flowiseai.com](http://cloud.flowiseai.com/)
  sends a reset password link over the unsecured HTTP protocol instead of HTTPS. This
  behavior introduces the risk of a man-in-the-middle (MITM) attack, where an attacker
  on the same network as the user (e.g., public Wi-Fi) can intercept the reset link
  and gain unauthorized access to the victim’s account.\n\n**Steps to Reproduce:**\n1.
  Sign up for a new account on https://cloud.flowiseai.com/register.\n2. Navigate
  to the https://cloud.flowiseai.com/forgot-password page and enter your email.\n3.
  Open your inbox and locate the password reset email.\n4. Copy the reset link and
  inspect its protocol – it uses http:// instead of https://."
