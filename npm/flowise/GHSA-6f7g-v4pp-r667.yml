title: "Flowise: Unauthenticated OAuth 2.0 Access Token Disclosure via Public Chatflow
  in Flowise"
description: "Flowise contains an authentication bypass vulnerability that allows
  an unauthenticated attacker to obtain OAuth 2.0 access tokens associated with a
  public chatflow.\n\nBy accessing a public chatflow configuration endpoint, an attacker
  can retrieve internal workflow data, including OAuth credential identifiers, which
  can then be used to refresh and obtain valid OAuth 2.0 access tokens without authentication."
