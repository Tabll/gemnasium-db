title: "Flowise: Public chatflow endpoints return unsanitized flowData including plaintext
  API keys, passwords, and credential IDs"
description: "The `GET /api/v1/public-chatflows/:id` endpoint returns the full chatflow
  object **without sanitization** for public chatflows. Docker validation revealed
  this is worse than initially assessed: the `sanitizeFlowDataForPublicEndpoint` function
  does NOT exist in the released v3.0.13 Docker image. Both `public-chatflows` AND
  `public-chatbotConfig` return completely raw flowData including credential IDs,
  plaintext API keys, and password-type fields."
