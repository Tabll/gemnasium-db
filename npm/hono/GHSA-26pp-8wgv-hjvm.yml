title: "Hono missing validation of cookie name on write path in setCookie()"
description: "Cookie names are not validated on the write path when using `setCookie()`,
  `serialize()`, or `serializeSigned()` to generate Set-Cookie headers.\n\nWhile certain
  cookie attributes such as domain and path are validated, the cookie name itself
  may contain invalid characters.\n\nThis results in inconsistent handling of cookie
  names between parsing (read path) and serialization (write path)."
