title: "Hono vulnerable to Prototype Pollution possible through __proto__ key allowed
  in parseBody({ dot: true })"
description: "When using `parseBody({ dot: true })` in HonoRequest, specially crafted
  form field names such as `__proto__.x` could create objects containing a `__proto__`
  property.\n\nIf the parsed result is later merged into regular JavaScript objects
  using unsafe merge patterns, this may lead to prototype pollution in the target
  object."
