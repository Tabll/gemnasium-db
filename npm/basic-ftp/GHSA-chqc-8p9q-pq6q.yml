title: "basic-ftp has FTP Command Injection via CRLF"
description: "`basic-ftp` version `5.2.0` allows FTP command injection via CRLF sequences
  (`\\r\\n`) in file path parameters passed to high-level path APIs such as `cd()`,
  `remove()`, `rename()`, `uploadFrom()`, `downloadTo()`, `list()`, and `removeDir()`.
  The library's `protectWhitespace()` helper only handles leading spaces and returns
  other paths unchanged, while `FtpContext.send()` writes the resulting command string
  directly to the control socket with `\\r\\n` appended. This lets attacker-controlled
  path strings split one intended FTP command into multiple commands."
