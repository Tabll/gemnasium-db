title: "Nodemailer Vulnerable to SMTP Command Injection via CRLF in Transport name
  Option (EHLO/HELO) "
description: "Nodemailer versions up to and including 8.0.4 are vulnerable to SMTP
  command injection via CRLF sequences in the transport `name` configuration option.
  The `name` value is used directly in the EHLO/HELO SMTP command without any sanitization
  for carriage return and line feed characters (`\\r\\n`). An attacker who can influence
  this option can inject arbitrary SMTP commands, enabling unauthorized email sending,
  email spoofing, and phishing attacks."
