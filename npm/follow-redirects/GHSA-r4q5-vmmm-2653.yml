package_slug: "npm/follow-redirects"
title: "follow-redirects leaks Custom Authentication Headers to Cross-Domain Redirect
  Targets"
description: "When an HTTP request follows a cross-domain redirect (301/302/307/308),
  `follow-redirects` only strips `authorization`, `proxy-authorization`, and `cookie`
  headers (matched by regex at index.js:469-476). Any custom authentication header
  (e.g., `X-API-Key`, `X-Auth-Token`, `Api-Key`, `Token`) is forwarded verbatim to
  the redirect target.\n\nSince `follow-redirects` is the redirect-handling dependency
  for **axios** (105K+ stars), this vulnerability affects the entire axios ecosystem."
