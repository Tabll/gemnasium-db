title: "Paperclip: codex_local inherited ChatGPT/OpenAI-connected Gmail and was able
  to send real email"
description: "A Paperclip-managed `codex_local` runtime was able to access and use
  a Gmail connector that I had connected in the ChatGPT/OpenAI apps UI, even though
  I had not explicitly connected Gmail inside Paperclip or separately inside Codex.\n\nIn
  my environment this enabled mailbox access and a real outbound email to be sent
  from my Gmail account. After I manually intervened to stop the workflow, follow-up
  retraction messages were also sent, confirming repeated outward write/send capability.\n\nThis
  appears to be a trust-boundary failure between Paperclip-managed Codex execution
  and inherited OpenAI app connectors, amplified by dangerous-by-default runtime settings."
