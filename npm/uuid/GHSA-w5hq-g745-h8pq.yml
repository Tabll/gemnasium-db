title: "uuid: Missing buffer bounds check in v3/v5/v6 when buf is provided"
description: "`v3`, `v5`, and `v6` accept external output buffers but do not reject
  out-of-range writes (small `buf` or large `offset`).\nBy contrast, `v4`, `v1`, and
  `v7` explicitly throw `RangeError` on invalid bounds.\n\nThis inconsistency allows
  **silent partial writes** into caller-provided buffers."
