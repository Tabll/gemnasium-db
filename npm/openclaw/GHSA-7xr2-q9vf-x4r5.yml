title: "OpenClaw: Symlink Traversal via IDENTITY.md appendFile in agents.create/update
  (Incomplete Fix for CVE-2026-32013)"
description: "The patch for CVE-2026-32013 introduced symlink resolution and workspace
  boundary enforcement for `agents.files.get` and `agents.files.set`. However, two
  other handlers in the same file (`agents.create` and `agents.update`) still use
  raw `fs.appendFile` on the `IDENTITY.md` file **without any symlink containment
  check**. An attacker who can place a symlink in the agent workspace can hijack the
  `IDENTITY.md` path to append attacker-controlled content to arbitrary files on the
  system."
