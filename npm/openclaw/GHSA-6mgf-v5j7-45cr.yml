package_slug: "npm/openclaw"
title: "OpenClaw: fetch-guard forwards custom authorization headers across cross-origin
  redirects"
description: "OpenClaw's `fetchWithSsrFGuard(...)` followed cross-origin redirects
  while preserving arbitrary caller-supplied headers except for a narrow denylist
  (`Authorization`, `Proxy-Authorization`, `Cookie`, `Cookie2`). This allowed custom
  authorization headers such as `X-Api-Key`, `Private-Token`, and similar sensitive
  headers to be forwarded to a different origin after a redirect.\n\nThe fix switches
  cross-origin redirect handling from a narrow sensitive-header denylist to a safe-header
  allowlist, so only benign headers such as content negotiation and cache validators
  survive an origin change."
