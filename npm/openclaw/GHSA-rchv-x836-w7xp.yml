title: "OpenClaw's dashboard leaked gateway auth material via browser URL/query and
  localStorage"
description: "OpenClaw's macOS Dashboard flow exposed Gateway authentication material
  to browser-controlled surfaces.\n\nBefore the fix, the macOS app appended the shared
  Gateway `token` and `password` to the Dashboard URL query string when opening the
  Control UI in the browser. The Control UI then imported the token and persisted
  it into browser `localStorage` under `openclaw.control.settings.v1`.\n\nThis expanded
  exposure of reusable Gateway admin credentials into browser address-bar/query surfaces
  and persistent script-readable storage."
