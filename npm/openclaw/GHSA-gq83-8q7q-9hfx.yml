package_slug: "npm/openclaw"
title: "OpenClaw's serialize sandbox registry writes to prevent races and delete-rollback
  corruption"
description: "Concurrent `updateRegistry`/`removeRegistryEntry` operations for sandbox
  containers and browsers could lose updates or resurrect removed entries under race
  conditions.\n\nThe registry writes were read-modify-write in a window with no locking
  and permissive fallback parsing, so concurrent registry updates could produce stale
  snapshots and overwrite each other.\n\nThat desyncs sandbox state and can affect
  `sandbox list`, `sandbox prune`, and `sandbox recreate --all` behavior."
