description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-8g75-q649-6pv6. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.8 contains an approval
  bypass vulnerability in system.run where mutable script operands are not bound across
  approval and execution phases. Attackers can obtain approval for script execution,
  modify the approved script file before execution, and execute different content
  while maintaining the same approved command shape."
