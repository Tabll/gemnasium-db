description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-65h8-27jh-q8wv. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.22 performs cryptographic
  and dispatch operations on inbound Nostr direct messages before enforcing sender
  and pairing policy validation. Attackers can trigger unauthorized pre-authentication
  computation by sending crafted DM messages, enabling denial of service through resource
  exhaustion."
