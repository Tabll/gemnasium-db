title: "OpenClaw: Image Tool `tools.fs.workspaceOnly` Bypass via Sandbox Bridge Mounts"
description: "The `image` tool did not fully honor the `tools.fs.workspaceOnly` filesystem
  boundary. In affected releases, image-path resolution could still traverse sandbox
  bridge mounts outside the workspace and read files from mounted directories that
  the other file tools would reject."
