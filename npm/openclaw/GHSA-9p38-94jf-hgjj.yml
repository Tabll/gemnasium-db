title: "OpenClaw has macOS `system.run` allowlist bypass via quoted command substitution"
description: "In OpenClaw's macOS node-host path, `system.run` allowlist parsing in
  `security=allowlist` mode failed to reject command substitution tokens when they
  appeared inside double-quoted shell text.\n\nBecause of that gap, payloads like
  `echo \"ok $(id)\"` could be treated as allowlist hits (first executable token `echo`)
  while still executing non-allowlisted subcommands through shell substitution."
