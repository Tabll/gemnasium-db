title: "OpenClaw: Discord DM reaction ingress missed dmPolicy/allowFrom checks in
  restricted setups"
description: "In OpenClaw `<= 2026.2.24`, Discord direct-message reaction notifications
  did not consistently apply the same DM authorization checks (`dmPolicy` / `allowFrom`)
  that are enforced for normal DM message ingress.\n\nIn restrictive DM setups, a
  non-allowlisted Discord user who can react to a bot-authored DM message could still
  enqueue a reaction-derived system event in the session.\n\nThis is a reaction-only
  ingress inconsistency. By itself it does not directly execute commands; practical
  impact depends on downstream automation/tool policy."
