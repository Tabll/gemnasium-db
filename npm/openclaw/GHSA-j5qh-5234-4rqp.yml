description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-99qw-6mr3-36qr. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.12 automatically
  discovers and loads plugins from .OpenClaw/extensions/ without explicit trust verification,
  allowing arbitrary code execution. Attackers can execute malicious code by including
  crafted workspace plugins in cloned repositories that execute when users run OpenClaw
  from the directory."
