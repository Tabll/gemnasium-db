description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-cfvj-7rx7-fc7c. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.3.2 contain
  a vulnerability in the stageSandboxMedia function in which it fails to validate
  destination symlinks during media staging, allowing writes to follow symlinks outside
  the sandbox workspace. Attackers can exploit this by placing symlinks in the media/inbound
  directory to overwrite arbitrary files on the host system outside sandbox boundaries."
