title: "Duplicate Advisory: OpenClaw Telegram webhook request bodies were read before
  secret validation, enabling unauthenticated resource exhaustion"
description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-jq3f-vjww-8rq7. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw before 2026.3.13 reads and buffers
  Telegram webhook request bodies before validating the x-telegram-bot-api-secret-token
  header, allowing unauthenticated attackers to exhaust server resources. Attackers
  can send POST requests to the webhook endpoint to force memory consumption, socket
  time, and JSON parsing work before authentication validation occurs."
