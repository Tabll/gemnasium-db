package_slug: "npm/openclaw"
title: "OpenClaw has Sandbox Media Root Bypass via Unnormalized `mediaUrl` / `fileUrl`
  Parameter Keys (CWE-22)"
description: "A path traversal vulnerability in the agent sandbox enforcement allows
  a sandboxed agent to read arbitrary files from other agents' workspaces by using
  the `mediaUrl` or `fileUrl` parameter key in message tool calls. The `normalizeSandboxMediaParams`
  function only checks `[\"media\", \"path\", \"filePath\"]` keys, while `mediaUrl`
  and `fileUrl` escape normalization entirely. Combined with `handlePluginAction`
  dropping `mediaLocalRoots` from the dispatch context, this enables a full sandbox
  escape where any agent can read files outside its designated sandbox root."
