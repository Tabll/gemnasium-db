description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-vvgp-4c28-m3jm. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.25 contain
  an authentication bypass vulnerability in the trusted-proxy Control UI pairing mechanism
  that accepts client.id=control-ui without proper device identity verification. An
  authenticated node role websocket client can exploit this by using the control-ui
  client identifier to skip pairing requirements and gain unauthorized access to node
  event execution flows."
