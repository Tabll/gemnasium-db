title: "OpenClaw: Agent gateway config mutations could change protected operator settings"
description: "The agent-facing `gateway config.patch` / `config.apply` guard did not
  cover several operator-trusted settings, including sandbox policy, plugin enablement,
  gateway auth/TLS, hook routing, MCP server configuration, SSRF policy, and filesystem
  hardening. A prompt-injected model with access to the owner-only gateway tool could
  persist changes to those settings.\n\nThis is a model-to-operator guard bypass,
  not a remote unauthenticated gateway compromise. Severity is medium."
