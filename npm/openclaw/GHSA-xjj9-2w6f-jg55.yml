description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-6c9j-x93c-rw6j. This link is maintained to preserve external
  references.\n\n### Original Description\nA vulnerability was identified in OpenClaw
  up to 2026.2.17. This issue affects the function tools.exec.safeBins of the component
  File Existence Handler. The manipulation leads to information exposure through discrepancy.
  The attack needs to be performed locally. Upgrading to version 2026.2.19-beta.1
  is capable of addressing this issue. The identifier of the patch is bafdbb6f112409a65decd3d4e7350fbd637c7754.
