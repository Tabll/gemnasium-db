description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-cg6c-q2hx-69h7. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.23 contains a replay
  identity vulnerability in Plivo V2 signature verification that allows attackers
  to bypass replay protection by modifying query parameters. The verification path
  derives replay keys from the full URL including query strings instead of the canonicalized
  base URL, enabling attackers to mint new verified request keys through unsigned
  query-only changes to signed requests."
