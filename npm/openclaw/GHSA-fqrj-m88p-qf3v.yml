title: "OpenClaw: Zalo replay dedupe cache could suppress events across authenticated
  webhook targets"
description: "Before OpenClaw 2026.3.31, the Zalo webhook replay-dedupe cache was
  shared across authenticated webhook targets and keyed too broadly. In multi-account
  deployments, a replay seen on one account could suppress a legitimate event on another
  account if `event_name` and `message_id` matched."
