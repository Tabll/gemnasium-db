title: "Duplicate Advisory: OpenClaw's complex interpreter pipelines could skip exec
  script preflight validation"
description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-fvx6-pj3r-5q4q. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw versions prior to commit 8aceaf5
  contain a preflight validation bypass vulnerability in shell-bleed protection that
  allows attackers to execute blocked script content by using piped or complex command
  forms that the parser fails to recognize. Attackers can craft commands such as piped
  execution, command substitution, or subshell invocation to bypass the validateScriptFileForShellBleed()
  validation checks and execute arbitrary script content that would otherwise be blocked."
