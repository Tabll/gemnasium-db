title: "OpenClaw: Hardlink alias checks could bypass workspace-only file boundaries
  in specific configurations"
description: "In certain workspace-restricted configurations, OpenClaw could follow
  hardlink aliases inside the workspace that reference files outside the workspace
  boundary.\n\nBy default, `tools.fs.workspaceOnly` is off. This primarily affects
  deployments that intentionally enable workspace-only filesystem restrictions (and
  workspace-only `apply_patch` checks)."
