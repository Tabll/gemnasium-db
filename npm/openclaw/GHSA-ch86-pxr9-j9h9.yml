description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-9jpj-g8vv-j5mf. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.4.2 reuses the PKCE
  verifier as the OAuth state parameter in the Gemini OAuth flow, exposing it through
  the redirect URL. Attackers who capture the redirect URL can obtain both the authorization
  code and PKCE verifier, defeating PKCE protection and enabling token redemption."
