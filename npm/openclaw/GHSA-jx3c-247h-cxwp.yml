description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-3qpv-xf3v-mm45. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.31 allows workspace
  .env files to override the OPENCLAW_BUNDLED_HOOKS_DIR environment variable, enabling
  loading of attacker-controlled hook code. Attackers can replace trusted default-on
  bundled hooks from untrusted workspaces to execute arbitrary code."
