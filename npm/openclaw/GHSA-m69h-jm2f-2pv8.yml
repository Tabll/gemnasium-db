title: "OpenClaw: Feishu reaction events could bypass group authorization and mention
  gating"
description: "A Feishu reaction-originated synthetic event could misclassify a group
  conversation as `p2p` when the inbound reaction payload omitted `chat_type`. Authorization
  and mention-gating logic keyed off that incorrect chat type and evaluated the event
  as a direct message instead of a group message."
