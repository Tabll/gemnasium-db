description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-6j27-pc5c-m8w8. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.22 contain
  an authorization bypass vulnerability in allow-always wrapper persistence that allows
  attackers to bypass approval checks by persisting wrapper-level allowlist entries
  instead of validating inner executable intent. Remote attackers can approve benign
  wrapped system.run commands and subsequently execute different payloads without
  approval, enabling remote code execution on gateway and node-host execution flows."
