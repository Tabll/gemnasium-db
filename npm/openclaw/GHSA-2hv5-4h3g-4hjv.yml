description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-6336-qqw9-v6x6. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.31 lacks a shared
