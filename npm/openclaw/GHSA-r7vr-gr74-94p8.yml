title: "OpenClaw: Command-authorized non-owners could reach owner-only `/config` and
  `/debug` surfaces"
description: "OpenClaw documented `/config` and `/debug` as owner-only commands, but
  the command handlers checked only whether the sender was command-authorized. A lower-trust
  sender who was intentionally allowed to run commands could still reach privileged
  configuration and debugging surfaces."
