title: "OpenClaw: Discord guild reaction ingress could bypass users and roles allowlists"
description: "In affected versions of `openclaw`, Discord reaction ingestion for guild
  channels did not enforce the same member users and roles allowlist checks used for
  normal inbound guild messages. A non-allowlisted guild member could still trigger
  reaction events that were accepted and queued as trusted system events for the target
  session."
