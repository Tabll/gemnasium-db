description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-4qwc-c7g9-4xcw. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.22 contains an unbounded
