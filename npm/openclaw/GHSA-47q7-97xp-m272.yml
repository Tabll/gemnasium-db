title: "OpenClaw: Config writes could persist resolved ${VAR} secrets to disk"
description: "OpenClaw hooks previously compared the provided hook token using a regular
  string comparison. Because this comparison is not constant-time, an attacker with
  network access to the hooks endpoint could potentially use timing measurements across
  many requests to gradually infer the token.\n\nIn practice, this typically requires
  hooks to be exposed to an untrusted network and a large number of requests; real-world
  latency and jitter can make reliable measurement difficult."
