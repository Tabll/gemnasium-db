description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-vqx8-9xxw-f2m7. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.23 contain
  a vulnerability in Twilio webhook event deduplication where normalized event IDs
  are randomized per parse, allowing replay events to bypass manager dedupe checks.
  Attackers can replay Twilio webhook events to trigger duplicate or stale call-state
  transitions, potentially causing incorrect call handling and state corruption."
