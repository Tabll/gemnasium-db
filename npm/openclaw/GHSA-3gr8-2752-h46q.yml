description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-v8wv-jg3q-qwpq. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.24 contains a sandbox
  bypass vulnerability in the message tool that allows attackers to read arbitrary
  local files by using mediaUrl and fileUrl alias parameters that bypass localRoots
  validation. Remote attackers can exploit this by routing file requests through unvalidated
  alias parameters to access files outside the intended sandbox directory."
