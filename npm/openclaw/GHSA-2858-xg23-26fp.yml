title: "OpenClaw: Node camera URL payload host-binding bypass allowed gateway fetch
  pivots"
description: "OpenClaw accepted `camera.snap` / `camera.clip` node payload `url` fields
  and downloaded them on the gateway/agent host without binding downloads to the resolved
  node host.\n\nIn OpenClaw's documented trust model, paired nodes are in the same
  operator trust boundary, so this is scoped as medium-severity hardening. A malicious
  or compromised paired node could still steer gateway-host fetches during camera
  URL retrieval."
