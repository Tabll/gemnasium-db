title: "OpenClaw: Channel commands could bypass account-scoped `configWrites` restrictions"
description: "In affected versions of `openclaw`, channel-initiated config mutations
  were authorized against the originating account's `configWrites` policy but did
  not consistently re-check the targeted account scope. An authorized sender on one
  account could mutate protected sibling-account configuration when the target account
  had `configWrites: false`."
