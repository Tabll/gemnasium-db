description: "Authenticated `/hooks/wake` and mapped `wake` payloads are promoted
  into the trusted `System:` prompt channel.\n\nAn authenticated wake hook or mapped
  wake payload could be promoted into the trusted System prompt channel instead of
  an untrusted event.\n\nOpenClaw is a user-controlled local assistant. This advisory
  is scoped to the OpenClaw trust model and does not assume a multi-tenant service
  boundary."
