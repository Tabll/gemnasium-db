description: "`system.run` env override sanitization allowed dangerous override-only
  helper-command pivots to reach subprocesses. A caller who could invoke `system.run`
  with `env` overrides could bypass allowlist/approval intent by steering an allowlisted
  tool through helper-command or config-loading environment variables such as `GIT_SSH_COMMAND`,
  editor/pager hooks, and `GIT_CONFIG_*` / `NPM_CONFIG_*`."
