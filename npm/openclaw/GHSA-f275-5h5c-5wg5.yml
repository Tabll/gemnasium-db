title: "Duplicate Advisory: OpenClaw: /pair approve command path omitted caller scope
  subsetting and reopened device pairing escalation"
description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-hc5h-pmr3-3497. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.28 contains a privilege
  escalation vulnerability in the /pair approve command path that fails to forward
  caller scopes into the core approval check. A caller with pairing privileges but
  without admin privileges can approve pending device requests asking for broader
  scopes including admin access by exploiting the missing scope validation in extensions/device-pair/index.ts
  and src/infra/device-pairing.ts."
