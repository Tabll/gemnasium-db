title: "OpenClaw's gateway tokenless Tailscale auth applied to HTTP routes"
description: "When tokenless Tailscale auth is enabled, OpenClaw should only allow
  forwarded-header auth for Control UI websocket authentication on trusted hosts.
  In affected versions, that tokenless path could also be used by HTTP gateway auth
  call sites, which could bypass token/password requirements for HTTP routes in trusted-network
  deployments."
