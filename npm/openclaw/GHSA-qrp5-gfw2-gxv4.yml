package_slug: "npm/openclaw"
title: "OpenClaw: Bundled MCP/LSP tools could bypass configured tool policy"
description: "Bundled MCP and LSP tools could be appended to the agent's effective
  tool set after the normal tool-policy pipeline had already filtered core tools.
  If an operator configured a restrictive policy, such as a tool profile, explicit
  allow/deny list, owner-only tool restriction, sandbox tool policy, or subagent tool
  policy, a bundled MCP/LSP tool could remain available even though the same policy
  would have denied it.\n\nThe issue required a configured bundled MCP or LSP tool
  source and an operator policy that should have restricted that tool. This was a
  local agent policy-enforcement bypass, not an unauthenticated remote gateway compromise.
  Severity is medium."
