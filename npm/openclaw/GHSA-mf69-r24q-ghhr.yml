description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-wwfp-w96m-c6x8. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw 2026.2.26 before 2026.3.31 enforces
  pending pairing-request caps per channel file instead of per account, allowing attackers
  to exhaust the shared pending window. Remote attackers can submit pairing requests
  from other accounts to block new pairing challenges on unaffected accounts, causing
  denial of service."
