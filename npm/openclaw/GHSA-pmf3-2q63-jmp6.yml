description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-7xr2-q9vf-x4r5. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw through 2026.2.22 contains a symlink
  traversal vulnerability in agents.create and agents.update handlers that use fs.appendFile
  on IDENTITY.md without symlink containment checks. Attackers with workspace access
  can plant symlinks to append attacker-controlled content to arbitrary files, enabling
  remote code execution via crontab injection or unauthorized access via SSH key manipulation."
