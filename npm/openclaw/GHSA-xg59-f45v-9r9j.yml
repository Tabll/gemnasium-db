title: "Duplicate Advisory: OpenClaw's MS Teams sender allowlist bypass when route
  allowlist is configured and sender allowlist is empty"
description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-g7cr-9h7q-4qxq. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.8 contains a sender
  allowlist bypass vulnerability in its Microsoft Teams plugin that allows unauthorized
  senders to bypass intended authorization checks. When a team/channel route allowlist
  is configured with an empty groupAllowFrom parameter, the message handler synthesizes
  wildcard sender authorization, permitting any sender in the matched team/channel
  to trigger replies in allowlisted Teams routes."
