description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-g353-mgv3-8pcj. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.12 contains an authentication
  bypass vulnerability in Feishu webhook mode when only verificationToken is configured
  without encryptKey, allowing acceptance of forged events. Unauthenticated network
  attackers can inject forged Feishu events and trigger downstream tool execution
  by reaching the webhook endpoint."
