title: "OpenClaw: Hook mapping templates could bypass hook session-key opt-in"
description: "Templated hook mapping `sessionKey` values were treated differently
  from request-supplied session keys. A hook mapping could render an externally influenced
  session key even when `hooks.allowRequestSessionKey` was disabled, bypassing the
  intended routing opt-in for hook callers.\n\nThis affects webhook routing isolation.
  It does not grant host execution by itself. Severity is medium."
