title: "OpenClaw: Trailing-dot localhost CDP hosts could bypass remote loopback protections"
description: "Before OpenClaw 2026.4.2, remote CDP discovery could return a trailing-dot
  localhost host such as `localhost.` and bypass OpenClaw's loopback-host normalization.
  That let a non-loopback remote CDP profile pivot the follow-up connection back onto
  localhost."
