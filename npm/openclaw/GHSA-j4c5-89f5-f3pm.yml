package_slug: "npm/openclaw"
title: "OpenClaw: Browser CDP profile creation skipped strict-mode SSRF checks"
description: "Browser profile creation normalized `cdpUrl` values before persisting
  them, but did not apply the configured browser SSRF policy at creation time. In
  deployments that explicitly disabled private-network CDP targets, a stored profile
  could still point at a private-network or metadata endpoint and later be probed
  by normal profile status flows.\n\nDefault trusted-operator browser behavior allows
  private-network CDP endpoints, so this only affected strict-mode deployments. Severity
  is low."
