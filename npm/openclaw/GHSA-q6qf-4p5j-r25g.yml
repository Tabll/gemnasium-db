title: "OpenClaw's image tool bypasses tools.fs.workspaceOnly on sandbox mount paths
  and exfiltrates out-of-workspace images"
description: "In OpenClaw, the sandboxed `image` tool did not honor `tools.fs.workspaceOnly=true`
  for mounted paths resolved by the sandbox FS bridge. This allowed reading out-of-workspace
  mounted images (for example `/agent/*`) and forwarding those bytes to vision model
  providers."
