description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-vhwf-4x96-vqx2. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.8 contains a path
  traversal vulnerability in the skills download installer that validates the tools
  root lexically but reuses the mutable path during archive download and copy operations.
  A local attacker can rebind the tools-root path between validation and final write
  to redirect the installer outside the intended tools directory."
