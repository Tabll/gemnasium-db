description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-xgf2-vxv2-rrmg. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.22 fail
