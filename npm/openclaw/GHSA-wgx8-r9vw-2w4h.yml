description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-82g8-464f-2mv7. This link is maintained to preserve external
  references.\n\n### Original Description\nA vulnerability was determined in OpenClaw
  2026.2.19-2. This vulnerability affects the function applySkillConfigenvOverrides
  of the component Skill Env Handler. Executing a manipulation can lead to code injection.
  It is possible to launch the attack remotely. Upgrading to version 2026.2.21-beta.1
  is able to resolve this issue. This patch is called 8c9f35cdb51692b650ddf05b259ccdd75cc9a83c.
  It is recommended to upgrade the affected component."
