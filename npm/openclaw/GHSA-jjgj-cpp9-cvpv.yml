package_slug: "npm/openclaw"
title: "OpenClaw Vulnerable to Local File Exfiltration via MCP Tool Result MEDIA:
  Directive Injection"
description: "A malicious or compromised MCP (Model Context Protocol) tool server
  can exfiltrate arbitrary local files from the host system by injecting `MEDIA:`
  directives into tool result text content. OpenClaw's tool result processing pipeline
  extracts file paths from `MEDIA:` tokens without source-level validation, passes
  them through a `localRoots` allowlist check that includes `os.tmpdir()` by default
  (covering `/tmp` on Linux/macOS and `%TEMP%` on Windows), and then reads and delivers
  the file contents to external messaging channels such as Discord, Slack, Telegram,
  and WhatsApp."
