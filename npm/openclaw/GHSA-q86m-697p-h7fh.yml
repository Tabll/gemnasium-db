title: "Duplicate Advisory: OpenClaw: system.run approvals did not bind PATH-token
  executable identity, enabling post-approval executable rebind"
description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-q399-23r3-hfx4. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.3.1 fail
  to pin executable identity for non-path-like argv[0] tokens in system.run approvals,
  allowing post-approval executable rebind attacks. Attackers can modify PATH resolution
  after approval to execute a different binary than the operator approved, enabling
  arbitrary command execution."
