description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-fg3m-vhrr-8gj6. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions 2026.1.21 prior to 2026.2.19
  contain a command injection vulnerability in the Lobster extension's Windows shell
  fallback mechanism that allows attackers to inject arbitrary commands through tool-provided
  arguments. When spawn failures trigger shell fallback with shell: true, attackers
  can exploit cmd.exe command interpretation to execute malicious commands by controlling
  workflow arguments."
