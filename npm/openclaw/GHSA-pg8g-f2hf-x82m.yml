description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-qx8j-g322-qj6m. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.31 (patched in 2026.4.8)
  contains a request body replay vulnerability in fetchWithSsrFGuard that allows unsafe
  request bodies to be resent across cross-origin redirects. Attackers can exploit
  this by triggering redirects to exfiltrate sensitive request data or headers to
  unintended origins."
