title: "Duplicate Advisory: OpenClaw: workspace path guard bypass on non-existent
  out-of-root symlink leaf"
description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-mgrq-9f93-wpp5. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.26 contain
  a path traversal vulnerability in workspace boundary validation that allows attackers
  to write files outside the workspace through in-workspace symlinks pointing to non-existent
  out-of-root targets. The vulnerability exists because the boundary check improperly
  resolves aliases, permitting the first write operation to escape the workspace boundary
  and create files in arbitrary locations."
