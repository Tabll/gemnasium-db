description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-25gx-x37c-7pph. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.21 sandbox
  browser entrypoint launches x11vnc without authentication for noVNC observer sessions,
  allowing unauthenticated access to the VNC interface. Remote attackers on the host
  loopback interface can connect to the exposed noVNC port to observe or interact
  with the sandbox browser without credentials."
