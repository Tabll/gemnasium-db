description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-6p8r-6m93-557f. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.28 contains an environment
  variable sanitization vulnerability where GIT_TEMPLATE_DIR and AWS_CONFIG_FILE are
  not blocked in the host-env blocklist. Attackers can exploit approved exec requests
  to redirect git or AWS CLI behavior through attacker-controlled configuration files
  to execute untrusted code or load malicious credentials."
