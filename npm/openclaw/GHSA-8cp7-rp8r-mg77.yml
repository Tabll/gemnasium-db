title: "OpenClaw has SSRF guard bypass via IPv6 transition over ISATAP"
description: "OpenClaw's SSRF hostname/IP guard did not detect ISATAP embedded IPv4
  addresses (`...:5efe:w.x.y.z`). A crafted URL containing an ISATAP IPv6 literal
  could embed a private IPv4 target (for example loopback) and bypass private-address
  filtering in URL-fetching paths."
