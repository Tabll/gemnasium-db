description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-7jx5-9fjg-hp4m. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.23 contain
  an authorization bypass vulnerability in the ACP client that auto-approves tool
  calls based on untrusted toolCall.kind metadata and permissive name heuristics.
  Attackers can bypass interactive approval prompts for read-class operations by spoofing
  tool metadata or using non-core read-like names to reach auto-approve paths."
