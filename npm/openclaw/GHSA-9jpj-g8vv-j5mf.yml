title: "OpenClaw: Gemini OAuth exposed the PKCE verifier through the OAuth state parameter"
description: "Before OpenClaw 2026.4.2, the Gemini OAuth flow reused the PKCE verifier
  as the OAuth `state` value. Because the provider reflected `state` back in the redirect
  URL, the verifier could be exposed alongside the authorization code."
