package_slug: "npm/openclaw"
title: "OpenClaw has an opt-in insecure Control UI auth over plaintext HTTP could
  allow privileged access"
description: "In affected releases, when an operator explicitly enabled `gateway.controlUi.allowInsecureAuth:
  true` and exposed the gateway over plaintext HTTP, Control UI authentication could
  permit privileged operator access without the intended device identity + pairing
  guarantees.\n\nThis required an insecure deployment choice and credential exposure
  risk (for example, plaintext transit or prior token leak). It was fixed on `main`
  in commit `40a292619e1f2be3a3b1db663d7494c9c2dc0abf` ([PR #20684](https://github.com/openclaw/openclaw/pull/20684))."
