description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-792q-qw95-f446. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.25 contain
  an access control vulnerability in signal reaction notification handling that allows
  unauthorized senders to enqueue status events before authorization checks are applied.
  Attackers can exploit the reaction-only event path in event-handler.ts to queue
  signal reaction status lines for sessions without proper DM or group access validation."
