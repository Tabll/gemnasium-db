description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-hjvp-qhm6-wrh2. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.26 contain
  an approval context-binding weakness in system.run execution flows with host=node
  that allows reuse of previously approved requests with modified environment variables.
  Attackers with access to an approval id can exploit this by reusing an approval
  with changed env input, bypassing execution-integrity controls in approval-enabled
  workflows."
