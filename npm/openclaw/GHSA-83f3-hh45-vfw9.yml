title: "OpenClaw: Android accepted cleartext remote gateway endpoints and sent stored
  credentials over ws://"
description: "Before OpenClaw 2026.4.2, Android accepted non-loopback cleartext `ws://`
  gateway endpoints and would send stored gateway credentials over that connection.
  Discovery beacons or setup codes could therefore steer the client onto a cleartext
  remote endpoint."
