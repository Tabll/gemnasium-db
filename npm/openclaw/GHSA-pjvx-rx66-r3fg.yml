title: "OpenClaw: Cross-account sender authorization expansion in `/allowlist ...
  --store` account scoping"
description: "`/allowlist ... --store` resolved the selected channel `accountId` for
  reads, but store writes still dropped that `accountId` and wrote into the legacy
  unscoped pairing allowlist store.\n\nBecause default-account reads still merge legacy
  unscoped entries, a store entry intended for one account could silently authorize
  the same sender on the `default` account.\n\nThis is a real cross-account sender-authorization
  scoping bug. Severity is set to **medium** because exploitation requires an already-authorized
  user who can run `/allowlist` edits."
