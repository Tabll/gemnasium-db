title: "OpenClaw's Webhooks SecretRef route secret remains valid after rotation/reload"
description: "OpenClaw webhooks allowed route secrets to be backed by `SecretRef`
  values, but cached the resolved secret for a route. After an operator rotated the
  underlying secret and ran `openclaw secrets reload`, the previous resolved webhook
  secret could remain valid until the plugin or gateway restarted."
