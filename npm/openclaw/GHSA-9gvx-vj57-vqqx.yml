description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-6mqc-jqh6-x8fc. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.23 contains an authentication
  bypass vulnerability in the Canvas gateway where authorizeCanvasRequest() unconditionally
  allows local-direct requests without validating bearer tokens or canvas capabilities.
  Attackers can send unauthenticated loopback HTTP and WebSocket requests to Canvas
  routes to bypass authentication and gain unauthorized access."
