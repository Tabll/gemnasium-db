title: "OpenClaw has a Gateway HTTP /v1/models Route Bypasses Operator Read Scope"
description: "The OpenAI-compatible HTTP endpoint `/v1/models` accepts bearer auth
  but does not enforce operator method scopes.\n\nIn contrast, the WebSocket RPC path
  enforces `operator.read` for `models.list`.\n\nA caller connected with `operator.approvals`
  (no read scope) is rejected for `models.list` (`missing scope: operator.read`) but
  can still enumerate model metadata through HTTP `/v1/models`.\n\nConfirmed on current
  `main` at commit `06de515b6c42816b62ec752e1c221cab67b38501`."
