title: "OpenClaw: Pairing setup codes exposed long-lived shared gateway credentials
  instead of short-lived bootstrap tokens"
description: "OpenClaw pairing setup codes generated by `/pair` and `openclaw qr`
  embedded the configured shared gateway token or password directly in the setup payload.
  Anyone who obtained that code from chat history, logs, screenshots, or copied QR
  payloads could recover the long-lived shared credential."
