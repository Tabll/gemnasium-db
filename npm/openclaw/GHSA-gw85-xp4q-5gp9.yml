title: "OpenClaw's Synology Chat dmPolicy=allowlist failed open on empty allowedUserIds,
  allowing unauthorized agent dispatch"
description: "In `openclaw` versions `2026.2.22` and `2026.2.23`, the optional `synology-chat`
  channel plugin had an authorization fail-open condition: when `dmPolicy` was `allowlist`
  and `allowedUserIds` was empty/unset, unauthorized senders were still allowed through
  to agent dispatch.\n\nThis is assessed as **medium** severity because it requires
  channel/plugin setup and Synology sender access, but can still trigger downstream
  agent/tool actions."
