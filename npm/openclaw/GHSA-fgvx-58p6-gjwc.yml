package_slug: "npm/openclaw"
title: "OpenClaw gateway agents.files symlink escape allowed out-of-workspace file
  read/write"
description: "The gateway `agents.files.get` and `agents.files.set` methods allowed
  symlink traversal for allowlisted workspace files. A symlinked allowlisted file
  (for example `AGENTS.md`) could resolve outside the agent workspace and be read/written
  by the gateway process.\n\nThis could enable arbitrary host file read/write within
  the gateway process permissions, and chained impact up to code execution depending
  on which files are overwritten."
