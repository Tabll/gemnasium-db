title: "OpenClaw Improperly Neutralizes Line Breaks in systemd Unit Generation Enables
  Local Command Execution (Linux)"
description: "A command injection vulnerability exists in OpenClaw’s Linux systemd
  unit generation path.\nWhen rendering `Environment=` entries, attacker-controlled
  values are not rejected for CR/LF, and `systemdEscapeArg()` uses an incorrect whitespace-matching
  regex. This allows newline injection to break out of an `Environment=` line and
  inject standalone systemd directives (for example, `ExecStartPre=`). On service
  restart, the injected command is executed, resulting in local arbitrary command
  execution (local RCE) under the gateway service user.\n\n---"
