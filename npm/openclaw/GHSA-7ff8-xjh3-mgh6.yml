title: "OpenClaw's non-default autoAllowSkills setting could bypass on-miss exec prompt"
description: "In `openclaw` versions up to and including `2026.2.22-2`, a non-default
  exec-approval configuration could allow a skill-name collision to bypass an `ask=on-miss`
  prompt.\n\nWhen `autoAllowSkills=true`, a path-scoped executable such as `./skill-bin`
  could resolve to basename `skill-bin`, satisfy the `skills` allowlist segment, and
  run without prompting for approval."
