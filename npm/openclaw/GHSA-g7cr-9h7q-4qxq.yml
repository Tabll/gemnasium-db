package_slug: "npm/openclaw"
title: "OpenClaw's MS Teams sender allowlist bypass when route allowlist is configured
  and sender allowlist is empty"
description: "OpenClaw's Microsoft Teams plugin widened group sender authorization
  when a team/channel route allowlist was configured but `groupAllowFrom` was empty.
  Before the fix, a matching route allowlist entry could cause the message handler
  to synthesize wildcard sender authorization for that route, allowing any sender
  in the matched team/channel to bypass the intended `groupPolicy: \"allowlist\"`
  sender check.\n\nThis does not affect default unauthenticated access, but it does
  weaken a documented Teams group authorization boundary and can allow unauthorized
  group senders to trigger replies in allowlisted Teams routes."
