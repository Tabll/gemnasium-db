title: "OpenClaw: Feishu card actions could misclassify DMs and skip dmPolicy"
description: "Feishu card-action callbacks could synthesize a message event with DM
  conversations classified as group conversations. That skipped `dmPolicy` enforcement
  for card actions, so a sender in a Feishu DM could trigger card-action flows that
  should have been blocked by a restrictive DM policy.\n\nThe issue is limited to
  Feishu card-action handling. Severity is medium."
