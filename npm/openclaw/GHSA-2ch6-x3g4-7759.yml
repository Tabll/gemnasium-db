package_slug: "npm/openclaw"
title: "OpenClaw's commands.allowFrom sender authorization accepted conversation identifiers
  via ctx.From"
description: "`commands.allowFrom` is documented as a sender authorization allowlist
  for commands/directives, but command authorization could include `ctx.From` (conversation
  identity) as a sender candidate.\n\nWhen `commands.allowFrom` contained conversation-like
  identifiers (for example Discord `channel:<id>` or WhatsApp group JIDs), command/directive
  authorization could be granted to participants in that conversation instead of only
  the intended sender identity."
