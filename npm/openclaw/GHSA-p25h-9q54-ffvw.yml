title: "OpenClaw has Zip Slip path traversal in tar archive extraction"
description: "OpenClaw versions before 2026.2.14 did not sufficiently validate TAR
  archive entry paths during extraction. A crafted archive could use path traversal
  sequences (for example `../../...`) to write files outside the intended destination
  directory (Zip Slip)."
