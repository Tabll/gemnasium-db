title: "OpenClaw: Workspace dotenv could override runtime-control environment variables"
description: "Workspace `.env` loading did not reserve the `OPENCLAW_` runtime-control
  namespace broadly enough. A malicious workspace could set variables such as `OPENCLAW_GIT_DIR`
  before source-update or installer flows, potentially steering trusted OpenClaw runtime
  behavior.\n\nThis requires running OpenClaw from an attacker-controlled workspace.
  Severity is medium."
