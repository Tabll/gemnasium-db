title: "OpenClaw: Pairing-scoped device tokens could mint `operator.admin` and reach
  node RCE"
description: "In affected versions of `openclaw`, a caller holding only `operator.pairing`
  could use `device.token.rotate` to mint a new token with broader scopes for an already
  paired device. If the target device was approved for `operator.admin`, the attacker
  could obtain an administrative token without already holding administrative scope."
