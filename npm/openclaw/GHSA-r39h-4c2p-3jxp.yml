title: "OpenClaw vulnerable to arbitrary code execution via attacker-controlled setup-api.js
  loaded from cwd during env-key resolution"
description: "OpenClaw's bundled plugin setup resolver could fall back to `process.cwd()`
  while resolving provider setup metadata. If a user ran an OpenClaw command from
  an attacker-controlled repository containing `extensions/<plugin>/setup-api.js`,
  OpenClaw could load and execute that JavaScript during ordinary provider/model status
  resolution."
