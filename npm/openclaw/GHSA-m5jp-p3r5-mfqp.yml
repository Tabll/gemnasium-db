description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-h4jx-hjr3-fhgc. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw before 2026.3.25 contains a privilege
  escalation vulnerability in the gateway plugin subagent fallback deleteSession function
  that uses a synthetic operator.admin runtime scope. Attackers can exploit this by
  triggering session deletion without a request-scoped client to execute privileged
  operations with unintended administrative scope."
