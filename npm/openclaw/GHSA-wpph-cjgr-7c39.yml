package_slug: "npm/openclaw"
title: "OpenClaw's typed sender-key matching for toolsBySender prevents identity-collision
  policy bypass"
description: "`channels.*.groups.*.toolsBySender` could match a privileged sender
  policy using a colliding mutable identity value (for example `senderName` or `senderUsername`)
  when deployments used untyped keys.\n\nThe fix introduces explicit typed sender
  keys (`id:`, `e164:`, `username:`, `name:`), keeps legacy untyped keys on a deprecated
  ID-only path, and adds regression coverage to prevent cross-identifier collisions."
