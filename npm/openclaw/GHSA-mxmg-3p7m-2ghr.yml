title: "Duplicate Advisory: OpenClaw: system.run approval identity mismatch could
  execute a different binary than displayed"
description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-hwpq-rrpf-pgcq. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.25 contain
  an approval-integrity bypass vulnerability in system.run where rendered command
  text is used as approval identity while trimming argv token whitespace, but runtime
  execution uses raw argv. An attacker can craft a trailing-space executable token
  to execute a different binary than what the approver displayed, allowing unexpected
  command execution under the OpenClaw runtime user when they can influence command
  argv and reuse an approval context."
