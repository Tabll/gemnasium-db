title: "OpenClaw's Node system.run approval hardening wrapper semantic drift can execute
  unintended local scripts"
description: "In `openclaw@2026.3.1`, node `system.run` approval-path hardening rewrote
  wrapper command argv in a way that changed execution semantics. A command shown/approved
  as a shell payload (for example `echo SAFE`) could execute a different local script
  when wrapper argv were rewritten."
