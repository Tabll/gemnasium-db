description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-5f9p-f3w2-fwch. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.22 contain
  an allowlist parsing mismatch vulnerability in the macOS companion app that allows
  authenticated operators to bypass exec approval checks. Attackers with operator.write
  privileges and a paired macOS beta node can craft shell-chain payloads that pass
  incomplete allowlist validation and execute arbitrary commands on the paired host."
