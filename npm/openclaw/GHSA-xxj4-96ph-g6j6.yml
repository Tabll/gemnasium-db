description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-xvx8-77m6-gwg6. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.11 contains a sandbox
  boundary bypass vulnerability in the fs-bridge writeFile commit step that uses an
  unanchored container path during the final move operation. An attacker can exploit
  a time-of-check-time-of-use race condition by modifying parent paths inside the
  sandbox to redirect committed files outside the validated writable path within the
  container mount namespace."
