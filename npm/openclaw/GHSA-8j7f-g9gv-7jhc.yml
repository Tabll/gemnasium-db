description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-rhfg-j8jq-7v2h. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.25 contains a server-side
  request forgery vulnerability in multiple channel extensions that fail to properly
  guard configured base URLs against SSRF attacks. Attackers can exploit unprotected
  fetch() calls against configured endpoints to rebind requests to blocked internal
  destinations and access restricted resources."
