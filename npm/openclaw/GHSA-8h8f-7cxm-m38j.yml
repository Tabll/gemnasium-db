description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-h3x4-hc5v-v2gm. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw versions prior to commit b57b680 contain
  an approval bypass vulnerability due to inconsistent environment variable normalization
  between approval and execution paths, allowing attackers to inject attacker-controlled
  environment variables into execution without approval system validation. Attackers
  can exploit differing normalization logic to discard non-portable keys during approval
  processing while accepting them at execution time, bypassing operator review and
  potentially influencing runtime behavior including execution of attacker-controlled
  binaries."
