description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-mwcg-wfq3-4gjc. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.25 contain
  a time-of-check-time-of-use vulnerability in approval-bound system.run execution
  where the cwd parameter is validated at approval time but resolved at execution
  time. Attackers can retarget a symlinked cwd between approval and execution to bypass
  command execution restrictions and execute arbitrary commands on node hosts."
