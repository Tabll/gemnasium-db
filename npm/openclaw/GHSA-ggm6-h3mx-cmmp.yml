description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-4685-c5cp-vp95. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.19 tools.exec.safeBins
  contains an input validation bypass vulnerability that allows attackers to execute
  unintended filesystem operations through sort output flags or recursive grep flags.
  Attackers with command execution access can leverage sort -o flag for arbitrary
  file writes or grep -R flag for recursive file reads, circumventing intended stdin-only
  restrictions."
