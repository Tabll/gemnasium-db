package_slug: "npm/openclaw"
title: "OpenClaw: Slack interactive callbacks could skip configured sender checks
  in some shared-workspace flows"
description: "In shared Slack workspace deployments that rely on sender restrictions
  (`allowFrom`, DM policy, or channel user allowlists), some interactive callbacks
  (`block_action`, `view_submission`, `view_closed`) could be accepted before full
  sender authorization checks.\n\nIn that scenario, an unauthorized workspace member
  could enqueue system-event text into an active session. This issue did not provide
  unauthenticated access, cross-gateway isolation bypass, or host-level privilege
  escalation by itself."
