title: "OpenClaw: Gateway /tools/invoke tool escalation + ACP permission auto-approval"
description: "OpenClaw Gateway exposes an authenticated HTTP endpoint (`POST /tools/invoke`)
  intended for invoking a constrained set of tools. Two issues could combine to significantly
  increase blast radius in misconfigured or exposed deployments:\n\n- The HTTP gateway
  layer did not deny high-risk session orchestration tools by default, allowing a
  caller with Gateway auth to invoke tools like `sessions_spawn` / `sessions_send`
  and pivot into creating or controlling agent sessions.\n- ACP clients could auto-approve
  permission requests for risky tools with insufficient user interaction/guardrails,
  reducing the friction that should normally prevent silent execution or mutation."
