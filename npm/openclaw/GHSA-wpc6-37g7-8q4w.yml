package_slug: "npm/openclaw"
title: "OpenClaw: Shell init-file options could satisfy exec allowlist script matching"
description: "Before OpenClaw 2026.3.31, exec allowlist matching could treat shell
  init-file wrapper invocations as if the approved script itself were being executed.
  Shell options such as `--rcfile`, `--init-file`, and `--startup-file` could therefore
  inherit allowlist trust from a matched script path even though the shell loaded
  attacker-chosen initialization first."
