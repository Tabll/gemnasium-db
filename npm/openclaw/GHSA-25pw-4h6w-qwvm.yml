title: "OpenClaw has a BlueBubbles group allowlist mismatch via DM pairing-store fallback"
description: "In `openclaw@2026.2.25`, BlueBubbles group authorization could incorrectly
  treat DM pairing-store identities as group allowlist identities when `dmPolicy=pairing`
  and `groupPolicy=allowlist`.\n\nA sender that was only DM-paired (not explicitly
  present in `groupAllowFrom`) could pass group sender checks for message and reaction
  ingress.\n\nPer OpenClaw's `SECURITY.md` trust model, this is a constrained authorization-consistency
  issue, not a multi-tenant boundary bypass or host-privilege escalation."
