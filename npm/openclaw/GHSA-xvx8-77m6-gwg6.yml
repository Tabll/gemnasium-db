title: "OpenClaw: Sandbox `writeFile` commit could race outside the validated path"
description: "In affected versions of `openclaw`, the sandbox fs-bridge `writeFile`
  commit step used an unanchored container path during the final move into place.
  An attacker racing parent-path changes inside the sandbox could redirect the committed
  file outside the validated sandbox path."
