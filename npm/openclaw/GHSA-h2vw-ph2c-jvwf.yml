title: "OpenClaw: Workspace dotenv MiniMax host override could redirect credentialed
  requests"
description: "A malicious workspace `.env` could set `MINIMAX_API_HOST` and redirect
  credentialed MiniMax requests to an attacker-controlled origin, exposing the MiniMax
  API key in the outbound `Authorization` header.\n\nThis requires running OpenClaw
  from an attacker-controlled workspace. Severity is medium."
