title: "OpenClaw: MCP stdio server env could load dangerous startup variables from
  workspace config"
description: "Workspace MCP stdio configuration could pass dangerous process-startup
  environment variables such as `NODE_OPTIONS`, `LD_PRELOAD`, or `BASH_ENV` to the
  spawned MCP server process. In a malicious workspace, this could make the MCP child
  load attacker-controlled code when the operator starts a session that uses that
  MCP server.\n\nThe impact is limited to local/workspace trust boundaries and requires
  the operator to run OpenClaw in a workspace containing the malicious MCP configuration.
  Severity is therefore medium, not high/critical."
