description: "Lower-trust background runtime output is injected into trusted `System:`
  events, and local async exec completion misses the intended `exec-event` downgrade.\n\nLower-trust
  runtime/background output could be promoted into trusted System events, allowing
  prompt-injection into later agent turns.\n\nOpenClaw is a user-controlled local
  assistant. This advisory is scoped to the OpenClaw trust model and does not assume
  a multi-tenant service boundary."
