title: "OpenClaw: Zalo webhook rate limiting could be bypassed before secret validation"
description: "The Zalo webhook handler applied request rate limiting only after webhook
  authentication succeeded. Requests with an invalid secret returned `401` but did
  not count against the rate limiter, allowing repeated secret guesses without triggering
  `429`."
