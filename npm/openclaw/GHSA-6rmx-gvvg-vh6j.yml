package_slug: "npm/openclaw"
title: "OpenClaw's hooks count non-POST requests toward auth lockout"
description: "OpenClaw's hooks HTTP handler counted hook authentication failures before
  rejecting unsupported HTTP methods. An unauthenticated client could send repeated
  non-`POST` requests (for example `GET`) with an invalid token to consume the hook
  auth failure budget and trigger the temporary lockout window for that client key.\n\nThe
  fix moves the hook method gate ahead of auth-failure accounting so unsupported methods
  return `405 Method Not Allowed` without incrementing the hook auth limiter."
