description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-p7gr-f84w-hqg5. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.3.1 fail
  to enforce sandbox inheritance during cross-agent sessions_spawn operations, allowing
  sandboxed sessions to create child processes under unsandboxed agents. An attacker
  with a sandboxed session can exploit this to spawn child runtimes with sandbox.mode
  set to off, bypassing runtime confinement restrictions."
