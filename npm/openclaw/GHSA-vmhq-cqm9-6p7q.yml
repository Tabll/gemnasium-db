title: "OpenClaw: `browser.request` let `operator.write` persist admin-only browser
  profile changes"
description: "An authorization mismatch in the gateway let an authenticated caller
  with only `operator.write` use `browser.request` to reach browser profile management
  routes that persist configuration to disk. In practice, this exposed an admin-only
  configuration write primitive through `/profiles/create`."
