title: "Duplicate Advisory: OpenClaw reuses the gateway auth token in the owner ID
  prompt hashing fallback"
description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-v6x2-2qvm-6gv8. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw versions prior to 2026.2.22 reuse
  gateway.auth.token as a fallback hash secret for owner-ID prompt obfuscation when
  commands.ownerDisplay is set to hash and commands.ownerDisplaySecret is unset, creating
  dual-use of authentication secrets across security domains. Attackers with access
  to system prompts sent to third-party model providers can derive the gateway authentication
  token from the hash outputs, compromising gateway authentication security."
