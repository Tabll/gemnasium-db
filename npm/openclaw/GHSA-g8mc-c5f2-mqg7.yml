description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-rqp8-q22p-5j9q This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.22 contains a webhook
  path route replacement vulnerability in the Synology Chat extension that allows
  attackers to collapse multi-account configurations onto shared webhook paths. Attackers
  can exploit inherited or duplicate webhook paths to bypass per-account DM access
  control policies and replace route ownership across accounts."
