description: "## Duplicate Advisory\n\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-v8cg-4474-49v8. This link is maintained to preserve external
  references.\n\n## Original Description\nOpenClaw versions prior to 2026.2.26 fail
  to enforce sender authorization in member and message subtype system event handlers,
  allowing unauthorized events to be enqueued. Attackers can bypass Slack DM allowlists
  and per-channel user allowlists by sending system events from non-allowlisted senders
  through message_changed, message_deleted, and thread_broadcast events."
