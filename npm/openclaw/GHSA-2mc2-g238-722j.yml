description: "Remote iMessage attachment fetches used SCP with trust-on-first-use
  host-key behavior and accepted unvalidated remote host tokens.\n\nBefore the fix:\n-
  SCP used `StrictHostKeyChecking=accept-new` in the remote attachment path.\n- `channels.imessage.remoteHost`
  was not validated as a strict SSH host token."
