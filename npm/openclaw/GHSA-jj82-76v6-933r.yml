title: "OpenClaw's exec allowlist wrapper analysis did not unwrap env/shell dispatch
  chains"
description: "`system.run` exec allowlist analysis treated wrapper binaries as the
  effective executable and did not fully unwrap `env`/shell-dispatch wrappers.\n\nThis
  allowed wrapper-smuggled payloads (for example `env bash -lc ...`) to satisfy an
  allowlist entry for the wrapper while executing non-allowlisted commands."
