package_slug: "npm/openclaw"
title: "OpenClaw: Isolated cron awareness events were recorded as trusted system events"
description: "Output from webhook-triggered isolated cron agent runs could be queued
  into the main session awareness stream without `trusted: false`. That made the event
  render as a trusted `System:` event instead of an untrusted system event.\n\nThis
  is a trust-labeling issue that can strengthen prompt-injection impact, but it does
  not directly bypass gateway auth, tool policy, or sandboxing. Severity is low."
