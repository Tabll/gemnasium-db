title: "FUXA has a hardcoded fallback JWT signing secret"
description: "FUXA used a static fallback JWT signing secret (`frangoteam751`) when
  no `secretCode` was configured.\n\nIf authentication was enabled without explicitly
  setting a custom secret, an attacker who knew the default value could forge valid
  JWT tokens and bypass authentication.\n\nThis issue has been addressed in version
  1.3.0 by removing the static fallback and generating a secure random secret when
  no `secretCode` is provided."
