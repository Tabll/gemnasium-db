package_slug: "npm/h3"
title: "H3 has an Open Redirect via Protocol-Relative Path in redirectBack() Referer
  Validation"
description: "The `redirectBack()` utility in h3 validates that the `Referer` header
  shares the same origin as the request before using its pathname as the redirect
  `Location`. However, the pathname is not sanitized for protocol-relative paths (starting
  with `//`). An attacker can craft a same-origin URL with a double-slash path segment
  that passes the origin check but produces a `Location` header interpreted by browsers
  as a protocol-relative redirect to an external domain."
