package_slug: "npm/h3"
title: "H3: Unbounded Chunked Cookie Count in Session Cleanup Loop may Lead to Denial
  of Service"
description: "The `setChunkedCookie()` and `deleteChunkedCookie()` functions in h3
  trust the chunk count parsed from a user-controlled cookie value (`__chunked__N`)
  without any upper bound validation. An unauthenticated attacker can send a single
  request with a crafted cookie header (e.g., `Cookie: h3=__chunked__999999`) to any
  endpoint using sessions, causing the server to enter an O(n²) loop that hangs the
  process."
