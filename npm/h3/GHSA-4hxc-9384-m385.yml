package_slug: "npm/h3"
title: "h3: SSE Event Injection via Unsanitized Carriage Return (`\\r`) in EventStream
  Data and Comment Fields (Bypass of CVE Fix)"
description: "The `EventStream` class in h3 fails to sanitize carriage return (`\\r`)
  characters in `data` and `comment` fields. Per the SSE specification, `\\r` is a
  valid line terminator, so browsers interpret injected `\\r` as line breaks. This
  allows an attacker to inject arbitrary SSE events, spoof event types, and split
  a single `push()` call into multiple distinct browser-parsed events. This is an
  incomplete fix bypass of commit `7791538` which addressed `\\n` injection but missed
  `\\r`-only injection."
