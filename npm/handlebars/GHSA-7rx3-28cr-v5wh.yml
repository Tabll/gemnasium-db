package_slug: "npm/handlebars"
title: "Handlebars.js has a Prototype Method Access Control Gap via Missing __lookupSetter__
  Blocklist Entry"
description: "The prototype method blocklist in `lib/handlebars/internal/proto-access.js`
  blocks `constructor`, `__defineGetter__`, `__defineSetter__`, and `__lookupGetter__`,
  but omits the symmetric `__lookupSetter__`. This omission is only exploitable when
  the non-default runtime option `allowProtoMethodsByDefault: true` is explicitly
  set — in that configuration `__lookupSetter__` becomes accessible while its counterparts
  remain blocked, creating an inconsistent security boundary.\n\n`4.6.0` is the version
  that introduced `protoAccessControl` and the `allowProtoMethodsByDefault` runtime
  option."
