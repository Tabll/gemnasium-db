title: "fido2-lib is vulnerable to DoS via cbor-extract heap buffer over-read in CBOR
  attestation parsing"
description: "fido2-lib v3.x depends on cbor-x (~1.6.0), which optionally pulls in
  cbor-extract (C++ native addon). cbor-extract <= 2.2.0 has a heap buffer over-read
  in `extractStrings()` — a 5-byte CBOR payload crashes Node.js with SIGSEGV. No JS
  exception, no try/catch, process dead.\n\nThe crash triggers during WebAuthn registration
  when the server decodes the attestation object. An attacker sends a crafted authenticator
  response to the registration endpoint — single request, unauthenticated, instant
  kill.\n\nFixed in cbor-extract@2.2.1 / cbor-x@1.6.3 (2026-03-08). fido2-lib@3.5.7
  still pins cbor-x ~1.6.0 which resolves to vulnerable cbor-extract."
