package_slug: "npm/i18nextify"
title: "i18nextify has DOM XSS via javascript:/data: URL schemes in translated href/src
  attributes"
description: "Versions of `i18nextify` prior to 4.0.8 substitute `{{key}}` interpolation
  tokens inside `src` and `href` attribute values with the raw string returned by
  `i18next.t()`. The substitution logic in `src/localize.js` (`replaceInside` handler
  around line 122) only guards against a duplicated `http://` origin prefix — it does
  not validate the URL scheme of the substituted value. A translated value such as
  `javascript:alert(1)` or `data:text/html,<script>...</script>` is applied unchanged
  to the live DOM attribute."
