package_slug: "npm/@saltcorn/server"
title: "Saltcorn: Open Redirect in `POST /auth/login` due to incomplete `is_relative_url`
  validation (backslash bypass)"
description: "Saltcorn validates the post-login `dest` parameter with a string check
  that only blocks `:/` and `//`. Because all WHATWG-compliant browsers normalise
  backslashes (`\\`) to forward slashes (`/`) for special schemes, a payload such
  as `/\\evil.com/path` slips through `is_relative_url()`, is emitted unchanged in
  the HTTP `Location` header, and causes the browser to navigate cross-origin to an
  attacker-controlled domain. The bug is reachable on a default install and only requires
  a victim who can be tricked into logging in via a crafted Saltcorn URL."
