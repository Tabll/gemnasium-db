package_slug: "npm/@saltcorn/data"
title: "@saltcorn/data: Tenant user role is used for tenant creation role check"
description: "When a tenant admin is logged out of the root domain (e.g., saltcorn.com)
  but logged in to their own tenant space as admin, they can simply append `/tenant/create`
  to their tenant URL. The system reads the role from the tenant context (admin),
  and a new tenant is created on the **root domain** (in `PUBLIC SCHEMA > _sc_tenants`),
  rather than in the tenant's own `_sc_tenants` table.\n\nIf the same logic applies
  to other routes, a tenant admin effectively gains admin rights on the root domain."
