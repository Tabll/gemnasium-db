title: "@saltcorn/data vulnerable to SQL Injection via jsexprToSQL Literal Handler"
description: "The `jsexprToSQL()` function in Saltcorn converts JavaScript expressions
  to SQL for use in database constraints. The `Literal` handler wraps string values
  in single quotes without escaping embedded single quotes, allowing SQL injection
  when creating Formula-type table constraints."
