title: "electerm: electerm_install_script_CommandInjection Vulnerability Report"
description: "_What kind of vulnerability is it? Who is impacted?_\n\n**Two Command
  Injection vulnerabilities in electerm:**\n\n1. **macOS Installer** (`electerm_CommandInjection_02`):
  A command injection vulnerability exists in `github.com/elcterm/electerm/npm/install.js:150`.
  The `runMac()` function appends attacker-controlled remote `releaseInfo.name` directly
  into an `exec(\"open ...\")` command without validation.\n\n2. **Linux Installer**
  (`electerm_CommandInjection_01`): A command injection vulnerability exists in `github.com/elcterm/electerm/npm/install.js:130`.
  The `runLinux()` function appends attacker-controlled remote version strings directly
  into an `exec(\"rm -rf ...\")` command without validation.\n\n**Who is impacted:**
  Users who run `npm install -g electerm`. An attacker who can control the remote
  release metadata (version string or release name) served by the project's update
  server could execute arbitrary system commands, tamper local files, and escalate
  compromise of development/runtime assets.\n\n---"
