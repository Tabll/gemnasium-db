package_slug: "npm/@tdurieux/anonymous_github"
title: "@tdurieux/anonymous_github Vulnerable to XSS via Unsanitized GitHub Repository
  Content Rendering in Anonymous GitHub Origin"
description: "Anonymous GitHub fetches repository content (e.g., markdown files) from
  GitHub's API and renders it without sanitization. On the client side, markdown is
  parsed with `marked` (with `sanitize: false`) and injected into the DOM via `$sce.trustAsHtml()`
  + `ng-bind-html`, bypassing AngularJS's built-in XSS protection. An attacker can
  craft a malicious GitHub repository whose README executes arbitrary JavaScript in
  the Anonymous GitHub origin."
