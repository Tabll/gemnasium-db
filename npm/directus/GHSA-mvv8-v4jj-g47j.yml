title: "Directus: Sensitive fields exposed in revision history"
description: "Directus stores revision records (in `directus_revisions`) whenever
  items are created or updated. Due to the revision snapshot code not consistently
  calling the `prepareDelta` sanitization pipeline, sensitive fields (including user
  tokens, two-factor authentication secrets, external auth identifiers, auth data,
  stored credentials, and AI provider API keys) could be stored in plaintext within
  revision records."
