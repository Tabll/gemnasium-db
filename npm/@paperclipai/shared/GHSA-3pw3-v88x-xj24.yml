title: "Paperclip: Arbitrary File Read via Agent-Controlled adapterConfig.instructionsFilePath"
description: "Paperclip contains an arbitrary file read vulnerability that allows
  an attacker with an Agent API key to read files from the Paperclip server host filesystem.\nThe
  vulnerability occurs because agents are allowed to modify their own adapterConfig
  through the /agents/:id API endpoint.\nThe configuration field adapterConfig.instructionsFilePath
  is later read directly by the server runtime using fs.readFile().\nBecause no validation
  or path restriction is applied, an attacker can supply an arbitrary filesystem path.\nThe
  Paperclip server then attempts to read that path from the host filesystem during
  agent execution.\nThis breaks the intended trust boundary between agent runtime
  configuration and server host filesystem access, allowing a compromised or malicious
  agent to access sensitive files on the host system."
