package_slug: "npm/@paperclipai/server"
title: "Paperclip: Cross-tenant agent API key IDOR in `/agents/:id/keys` routes allows
  full victim-company compromise"
description: "The `GET`, `POST`, and `DELETE` handlers under `/agents/:id/keys` in
  the Paperclip control-plane API only call `assertBoard(req)`, which verifies that
  the caller has a board-type session but does not verify that the caller has access
  to the company owning the target agent. A board user whose membership is limited
  to Company A can therefore list, create, or revoke agent API keys for any agent
  in Company B by supplying the victim agent's UUID in the URL path. The `POST` handler
  returns the newly-minted token in cleartext, which authenticates subsequent requests
  as `{type:\"agent\", companyId:<CompanyB>}`, giving the attacker full agent-level
  access inside the victim tenant — a complete cross-tenant compromise."
