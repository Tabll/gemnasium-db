package_slug: "npm/@paperclipai/server"
title: "Paperclip: OS Command Injection via Execution Workspace cleanupCommand"
description: "A critical OS command injection vulnerability exists in Paperclip's
  execution workspace lifecycle. An attacker can inject arbitrary shell commands into
  the `cleanupCommand` field via the `PATCH /api/execution-workspaces/:id` endpoint.
  When the workspace is archived, the server executes this command verbatim via `child_process.spawn(shell,
  [\"-c\", cleanupCommand])` with no input validation or sanitization. In `local_trusted`
  mode (the default for desktop installations), this requires zero authentication.\n\nThree
  independent proofs of exploitation were demonstrated on Windows 11: arbitrary file
  write, full system information exfiltration (`systeminfo`), and GUI application
  launch (`calc.exe`).\n\n---"
