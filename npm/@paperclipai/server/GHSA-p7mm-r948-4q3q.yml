package_slug: "npm/@paperclipai/server"
title: "Paperclip: Approval decision attribution spoofing via client-controlled `decidedByUserId`
  in paperclip server"
description: "The approval-resolution endpoints (`POST /approvals/:id/approve`, `/reject`,
  `/request-revision`) accept a client-supplied `decidedByUserId` field in the request
  body and write it verbatim into the authoritative `approvals.decidedByUserId` column
  — without cross-checking it against the authenticated actor. Any board user who
  can access an approval's company can record the decision as having been made by
  another user (e.g. the CEO), forging the governance audit trail. For `hire_agent`
  approvals with a monthly budget, the same attacker-controlled string is also stamped
  onto the resulting `budget_policies` row as `createdByUserId`/`updatedByUserId`."
