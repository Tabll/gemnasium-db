package_slug: "npm/@better-auth/oauth-provider"
title: "OAuth 2.1 Provider: Unprivileged users can register OAuth clients"
description: "An authorization bypass in the OAuth provider allows any authenticated
  low-privilege user to create OAuth clients even when the deployment configures clientPrivileges
  to restrict client creation. The option contract explicitly includes a create action,
  but the create paths never invoke that callback, so applications that rely on clientPrivileges
  for RBAC can be silently misconfigured into allowing unauthorized client registration."
