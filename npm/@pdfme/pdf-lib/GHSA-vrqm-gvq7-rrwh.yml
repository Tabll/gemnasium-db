package_slug: "npm/@pdfme/pdf-lib"
title: "PDFME Affected by Decompression Bomb in FlateDecode Stream Parsing Causes
  Memory Exhaustion DoS"
description: "The `DecodeStream.ensureBuffer()` method in `@pdfme/pdf-lib` doubles
  its internal buffer without any upper bound on the decompressed size. A crafted
  PDF containing a FlateDecode stream with a high compression ratio (decompression
  bomb) causes unbounded memory allocation during stream decoding, leading to memory
  exhaustion and denial of service in both server-side (generator) and client-side
  (UI) contexts."
