package_slug: "npm/@pdfme/common"
title: "PDFME has SSRF via Unvalidated URL Fetch in `getB64BasePdf` When `basePdf`
  Is Attacker-Controlled"
description: "The `getB64BasePdf` function in `@pdfme/common` fetches arbitrary URLs
  via `fetch()` without any validation when `basePdf` is a non-data-URI string and
  `window` is defined. An attacker who can control the `basePdf` field of a template
  (e.g., through a web application that accepts user-supplied templates) can force
  the server or client to make requests to arbitrary internal or external endpoints,
  enabling Server-Side Request Forgery (SSRF) in SSR contexts or blind request forgery
  in browser contexts."
