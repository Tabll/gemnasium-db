package_slug: "npm/mcp-bridge"
title: "MCP Connect has unauthenticated remote OS command execution via /bridge endpoint"
description: "When _AUTH_TOKEN_ and _ACCESS_TOKEN_ environment variables are not set
  (which is the default out-of-the-box configuration) the _/bridge_ HTTP endpoint
  is completely unauthenticated. Any network-accessible caller can POST a request
  with an attacker-controlled serverPath and args payload, causing the server to spawn
  an arbitrary OS process as the user running mcp-bridge. This results in full remote
  code execution on the host without any credentials."
