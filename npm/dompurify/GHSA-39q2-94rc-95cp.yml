title: "DOMPurify's ADD_TAGS function form bypasses FORBID_TAGS due to short-circuit
  evaluation"
description: "In `src/purify.ts:1117-1123`, `ADD_TAGS` as a function (via `EXTRA_ELEMENT_HANDLING.tagCheck`)
  bypasses `FORBID_TAGS` due to short-circuit evaluation.\n\nThe condition:\n```\n!(tagCheck(tagName))
  && (!ALLOWED_TAGS[tagName] || FORBID_TAGS[tagName])\n```\nWhen `tagCheck(tagName)`
  returns `true`, the entire condition is `false` and the element is kept — `FORBID_TAGS[tagName]`
  is never evaluated."
