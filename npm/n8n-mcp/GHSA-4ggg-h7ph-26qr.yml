package_slug: "npm/n8n-mcp"
title: "n8n-mcp has authenticated SSRF via instance-URL header in multi-tenant HTTP
  mode"
description: "An authenticated Server-Side Request Forgery in `n8n-mcp` allows a caller
  holding a valid `AUTH_TOKEN` to cause the server to issue HTTP requests to arbitrary
  URLs supplied through multi-tenant HTTP headers. Response bodies are reflected back
  through JSON-RPC, so an attacker can read the contents of any URL the server can
  reach — including cloud instance metadata endpoints (AWS IMDS, GCP, Azure, Alibaba,
  Oracle), internal network services, and any other host the server process has network
  access to.\n\nThe primary at-risk deployments are multi-tenant HTTP installations
  where more than one operator can present a valid `AUTH_TOKEN`, or where a token
  is shared with less-trusted clients. Single-tenant stdio deployments and HTTP deployments
  without multi-tenant headers are not affected."
