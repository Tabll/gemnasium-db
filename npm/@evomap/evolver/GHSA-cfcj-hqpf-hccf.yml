package_slug: "npm/@evomap/evolver"
title: "@evomap/evolver: Path Traversal in `evolver fetch` default-branch `safeId`
  allows Hub-controlled overwrite of project files (RCE)"
description: "The `evolver fetch` subcommand in `index.js` writes Hub-supplied `bundled_files[]`
  into a directory derived from a Hub-supplied `skill_id`. When `--out` is not used,
  the path-sanitizing regex permits `.` characters, allowing a `skill_id` of `..`
  to escape the `skills/` subdirectory and resolve to the user's current working directory.
  Combined with the file-extension allow-list (which includes `.js`/`.json`/`.sh`/`.py`/`.md`),
  this lets a malicious Hub overwrite the victim's `index.js`, `package.json`, or
  other files in cwd, achieving remote code execution on the next invocation of the
  evolver."
