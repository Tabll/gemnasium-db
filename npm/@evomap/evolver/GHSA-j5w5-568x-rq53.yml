title: "Evolver: Command Injection via `execSync` in `_extractLLM()` function allows
  Remote Code Execution"
description: "A command injection vulnerability in the `_extractLLM()` function allows
  attackers to execute arbitrary shell commands on the server. The function constructs
  a curl command using string concatenation and passes it to `execSync()` without
  proper sanitization, enabling remote code execution when the `corpus` parameter
  contains shell metacharacters."
