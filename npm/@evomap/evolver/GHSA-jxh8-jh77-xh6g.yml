package_slug: "npm/@evomap/evolver"
title: "@evomap/evolver's validator sandbox allowlist permits `npm`/`npx`, yielding
  RCE from Hub-delivered validation tasks via lifecycle scripts"
description: "The validator-mode sandbox executor (`src/gep/validator/sandboxExecutor.js`)
  places `npm` and `npx` in its hard executable allowlist. Because `npm install <pkg>`
  and `npx -y -p <pkg> <bin>` execute arbitrary code by design (preinstall/install/postinstall
  lifecycle scripts and remote-package bin entries), and because validator nodes consume
  `validation_commands` strings from unsigned Hub responses with no per-response signature
  check, an attacker who controls or MITMs the Hub achieves automatic remote code
  execution on every validator node within one daemon poll (default 60s)."
