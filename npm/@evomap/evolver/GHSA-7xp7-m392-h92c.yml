package_slug: "npm/@evomap/evolver"
title: "@evomap/evolver has an unbounded request body in proxy /asset/submit that
  causes persistent disk-exhaustion DoS"
description: "The EvoMap proxy daemon's HTTP body parser accepts requests of any size,
  and the `POST /asset/submit` route persists the full request body — verbatim and
  uncapped — as a JSONL line in `<dataDir>/messages.jsonl`. An unauthenticated local
  attacker (other local user, container neighbor, or malicious npm postinstall script
  running on the same host) can repeatedly POST large bodies to fill the disk. On
  restart, the daemon synchronously reads the entire file via `fs.readFileSync`, making
  the OOM/crash persistent."
