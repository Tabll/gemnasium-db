title: "Duplicate Advisory: OpenClaw: Unavailable local auth SecretRefs could fall
  through to remote credentials in local mode"
description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-qvr7-g57c-mrc7. This link is maintained to preserve external
  references.\n\n### Original Description\nOpenClaw before 2026.3.11 contains a credential
  fallback vulnerability where unavailable local gateway.auth.token and gateway.auth.password
  SecretRefs are treated as unset, allowing fallback to remote credentials in local
  mode. Attackers can exploit misconfigured local auth references to cause CLI and
  helper paths to select incorrect credential sources, potentially bypassing intended
  local authentication boundaries."
