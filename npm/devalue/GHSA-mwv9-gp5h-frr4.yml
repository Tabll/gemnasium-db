title: "Sveltejs devalue's `devalue.parse` and `devalue.unflatten` emit objects with
  `__proto__` own properties"
description: "In some circumstances, `devalue.parse` and `devalue.unflatten` could
  emit objects with `__proto__` own properties. This in and of itself is not a security
  vulnerability (and is possible with, for example, `JSON.parse` as well), but it
  can result in prototype injection if _downstream_ code handles it incorrectly:\n\n```ts\nconst
  result = devalue.parse(/* input creating an object with a __proto__ property */);\nconst
  target = {};\nObject.assign(target, result); // target's prototype is now polluted\n```"
