title: "mppx has multiple payment bypass and griefing vulnerabilities"
description: "Multiple vulnerabilities were discovered in `tempo/charge` and `tempo/session`
  which allowed for undesirable behaviors, including:\n- Replaying `tempo/charge`
  transaction hashes across push/pull modes, across charge/session endpoints, and
  via concurrent requests\n- Performing free `tempo/charge` requests due to missing
  transfer log verification in pull-mode\n- Replaying `tempo/charge` credentials across
  routes via cross-route scope confusion (`memo`/`splits` not included in scope binding)\n-
  Manipulating the fee payer of a `tempo/charge` handler into paying for requests
  (missing sender signature before co-signing)\n- Bypassing `tempo/session` voucher
  signature verification\n- Piggybacking off existing `tempo/session` channels via
  settle voucher reuse and weak channel ID binding\n- Performing free `tempo/session`
  requests by exploiting channel reopen without on-chain settled state\n- Accepting
  deductions on finalized `tempo/session` channels\n- Bypassing payment on free routes
  via method-mismatch fallback\n- Griefing `tempo/session` channels via force-close
  detection bypass (`closeRequestedAt` not persisted)"
