  bypasses"
description: "Gemini CLI (`@google/gemini-cli`) and the `run-gemini-cli` GitHub Action
  are being updated to harden workspace trust and tool allowlisting, in particular
  when used in untrusted environments like GitHub Actions. This update introduces
  a breaking change to how non-interactive (headless) environments handle folder trust,
  which may impact existing CI/CD workflows under specific conditions."
