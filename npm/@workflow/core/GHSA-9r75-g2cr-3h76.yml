title: "Vercel Workflow Allows Webhook Creation with Predictable User-Specified Tokens"
description: "`createWebhook()` in Vercel Workflow DevKit accepts a user-specified
  `token` parameter that serves as the credential for the public webhook endpoint
  `/.well-known/workflow/v1/webhook/{token}`. Official documentation recommended predictable
  token patterns, making it possible for an unauthenticated remote attacker to guess
  the token and inject arbitrary payloads into the workflow execution context."
