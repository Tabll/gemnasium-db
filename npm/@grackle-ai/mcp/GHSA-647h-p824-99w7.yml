package_slug: "npm/@grackle-ai/mcp"
title: "@grackle-ai/mcp has a workspace authorization bypass in its knowledge_search
  MCP tool"
description: "The `knowledge_search` and `knowledge_get_node` MCP tools are included
  in `SCOPED_TOOLS` (visible to scoped agents) but their handlers do not receive `authContext`
  and do not enforce workspace scoping. A scoped agent in Workspace A can supply an
  arbitrary `workspaceId` parameter to search or retrieve knowledge graph nodes from
  Workspace B, bypassing workspace isolation boundaries.\n\nThis is a **cross-workspace
  data leakage** vulnerability affecting any deployment where multiple workspaces
  contain sensitive knowledge graph data and scoped agents are used.\n\n**Affected
  code:**\n- `packages/mcp/src/tools/knowledge.ts:146-169` (knowledge_search handler)\n-
  `packages/mcp/src/tools/knowledge.ts:244-283` (knowledge_get_node handler)\n- `packages/mcp/src/tool-scoping.ts:11`
  (both tools listed in SCOPED_TOOLS)\n\n**Contrast with correct implementation:**
  `knowledge_create_node` (same file, lines 334-357) properly receives `authContext`
  and overrides the user-supplied `workspaceId` for scoped callers."
