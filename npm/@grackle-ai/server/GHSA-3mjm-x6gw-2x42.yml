title: "@grackle-ai/server has Missing Content-Security-Policy and X-Frame-Options
  Headers"
description: "The HTTP server does not set `Content-Security-Policy`, `X-Frame-Options`,
  or `X-Content-Type-Options` headers on any response. This reduces defense-in-depth
  against XSS, clickjacking, and MIME-sniffing attacks.\n\nWhile the current XSS attack
  surface is small (React-markdown is configured safely, no `dangerouslySetInnerHTML`,
  Vite does not generate source maps), the absence of these headers means any future
  XSS vulnerability would have no secondary defense layer.\n\n**Affected code:**\n-
  `packages/server/src/index.ts` — all `res.writeHead()` calls only set `Content-Type`,
  with no security headers"
