package_slug: "npm/@grackle-ai/server"
title: "@grackle-ai/server JSON.parse lacks try-catch logic in its gRPC Service AdapterConfig
  Handling"
description: "`JSON.parse(env.adapterConfig)` is called without error handling in
  three locations within the gRPC service. While the data originates from the server's
  own SQLite database and should always be valid JSON, database corruption, migration
  errors, or unexpected state could cause an unhandled exception that crashes the
  gRPC handler.\n\nAdditionally, the parsed result is cast as `Record<string, unknown>`
  and passed to adapter methods without property validation, creating a theoretical
  prototype pollution surface if the database is compromised.\n\n**Affected code:**\n-
  `packages/server/src/grpc-service.ts:415` — `reconnectOrProvision` handler\n- `packages/server/src/grpc-service.ts:482`
  — `stopEnvironment` handler\n- `packages/server/src/grpc-service.ts:498` — `destroyEnvironment`
  handler"
