title: "@grackle-ai/server has a Missing Secure Flag on Session Cookie"
description: "The session cookie is set with `HttpOnly; SameSite=Lax; Path=/` but
  does not include the `Secure` flag. This means the cookie will be sent over plain
  HTTP connections.\n\nSince the server binds to `127.0.0.1` by default and uses HTTP
  (not HTTPS), this is acceptable for localhost use. However, when `--allow-network`
  is used to bind to `0.0.0.0`, cookies could be transmitted over insecure network
  connections and intercepted by an attacker.\n\n**Affected code:**\n- `packages/server/src/session.ts:76`
  — cookie string lacks `; Secure` attribute"
