title: "@grackle-ai/server: Unescaped Error String in renderPairingPage() HTML Template"
description: "The `renderPairingPage()` function embeds the `error` parameter directly
  into HTML without escaping:\n```typescript\nconst errorHtml = error ? `<p style=\"color:#e74c3c\">${error}</p>`
  : \"\";\n```\n\nAll current call sites pass hardcoded strings, so this is **not
  exploitable today**. However, the function is architecturally fragile — if a future
  code change passes user-controlled or dynamic content into the error parameter,
  it would create an XSS vulnerability.\n\nThe `renderAuthorizePage()` function in
  the same file correctly uses `escapeHtml()` for dynamic content, making this an
  inconsistency.\n\n**Affected code:**\n- `packages/server/src/index.ts:64-89` — `renderPairingPage()`
  with unescaped error interpolation\n- Compare: `packages/server/src/index.ts:130`
  — `renderAuthorizePage()` correctly uses `escapeHtml()`"
