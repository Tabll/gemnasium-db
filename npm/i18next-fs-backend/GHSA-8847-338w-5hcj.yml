package_slug: "npm/i18next-fs-backend"
title: "i18next-fs-backend: Path traversal via unsanitised lng/ns allows arbitrary
  file read/overwrite"
description: "Versions of `i18next-fs-backend` prior to 2.6.4 interpolate the caller-supplied
  `lng` and `ns` values directly into the configured `loadPath` and `addPath` templates
  with no path-component validation and no sanitisation. When an application exposes
  the resolved language code to user-controlled input (`?lng=` query parameter, cookie,
  request header), a crafted value can break out of the intended locale directory.\n\nAffected
  call sites in `lib/index.js`:\n\n- `read` (line 38 pre-patch): `const filename =
  interpolate(loadPath, { lng: language, ns: namespace })`\n- `removeFile` (line 101
  pre-patch): same pattern against `addPath`\n- `writeFile` (line 127 pre-patch):
  same pattern against `addPath` for queued missing-key writes\n\nThe helper `interpolate`
  in `lib/utils.js` substitutes raw values with no encoding — unlike the `addQueryString`
  helper in `i18next-http-backend`, there is no equivalent safety for path interpolation."
