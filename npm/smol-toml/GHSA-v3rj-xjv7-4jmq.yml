title: "smol-toml: Denial of Service via TOML documents containing thousands of consecutive
  commented lines"
description: "An attacker can send a maliciously crafted TOML to cause the parser
  to crash, because of a stack overflow caused by thousands of consecutive commented
  lines.\n\nThe library uses recursion internally while parsing to skip over commented
  lines, which can be exploited to crash an application that is processing arbitrary
  TOML documents."
