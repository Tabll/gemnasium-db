title: "@stablelib/cbor: Prototype poisoning via `__proto__` map keys in CBOR decoding"
description: "`@stablelib/cbor` decodes CBOR maps into ordinary JavaScript objects
  and assigns attacker-controlled keys directly onto those objects. A CBOR map key
  named `__proto__` therefore changes the prototype of the decoded object instead
  of becoming an ordinary data property."
