package_slug: "npm/@capgo/cli"
title: "Capgo CLI: symlink-following local secret writes enable arbitrary file overwrite
  + world-readable credentials (0600 missing)"
description: "The Capgo CLI writes sensitive local files (.capgo API key file and
  build credentials JSON) using unsafe file operations that follow symlinks and do
  not enforce safe permissions. This allows an attacker-controlled repository to cause
  arbitrary file overwrite on the developer’s machine when the developer runs the
  CLI inside that repo. Additionally, global build credentials are written with world-readable
  permissions (664), exposing signing materials on shared systems."
