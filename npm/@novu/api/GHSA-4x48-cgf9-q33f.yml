title: "Novu has SSRF via conditions filter webhook bypasses validateUrlSsrf() protection"
description: "The conditions filter webhook at `libs/application-generic/src/usecases/conditions-filter/conditions-filter.usecase.ts`
  line 261 sends POST requests to user-configured URLs using raw `axios.post()` with
  no SSRF validation. The HTTP Request workflow step in the same codebase correctly
  uses `validateUrlSsrf()` which blocks private IP ranges. The conditions webhook
  was not included in this protection."
