title: "next-intl has an open redirect vulnerability"
description: "Applications using the `next-intl` middleware with `localePrefix: 'as-needed'`
  could construct URLs where path handling and the WHATWG URL parser resolved a relative
  redirect target to another host (e.g. scheme-relative `//` or control characters
  stripped by the URL parser), so the middleware could redirect the browser off-site
  while the user still started from a trusted app URL."
