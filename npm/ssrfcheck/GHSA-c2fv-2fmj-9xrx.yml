description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-p4hc-9pjh-55c8. This link is maintained to preserve external
  references.\n\n### Original Description\nVersions of the package ssrfcheck below
  1.2.0 are vulnerable to Server-Side Request Forgery (SSRF) due to an incomplete
  denylist of IP address ranges. Specifically, the package fails to classify the reserved
  IP address space 224.0.0.0/4 (Multicast) as invalid. This oversight allows attackers
  to craft requests targeting these multicast addresses."
