title: "Parse Server has a password reset token single-use bypass via concurrent requests"
description: "The password reset mechanism does not enforce single-use guarantees
  for reset tokens. When a user requests a password reset, the generated token can
  be consumed by multiple concurrent requests within a short time window. An attacker
  who has intercepted a password reset token can race the legitimate user's password
  reset request, causing both requests to succeed. This may result in the legitimate
  user believing their password was changed successfully while the attacker's password
  takes effect instead.\n\nAll Parse Server deployments that use the password reset
  feature are affected."
