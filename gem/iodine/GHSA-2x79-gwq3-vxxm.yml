title: "Uncontrolled resource consumption and loop with unreachable exit condition
  in facil.io and downstream iodine ruby gem"
description: "`fio_json_parse` can enter an infinite loop when it encounters a nested
  JSON value starting with `i` or `I`. The process spins in user space and pegs one
  CPU core at ~100% instead of returning a parse error. Because `iodine` vendors the
  same parser code, the issue also affects `iodine` when it parses attacker-controlled
  JSON.\n\nThe smallest reproducer found is `[i`. The quoted-value form that originally
  exposed the issue, `[\"\"i`, reaches the same bug because the parser tolerates missing
  commas and then treats the trailing `i` as the start of another value."
