title: "Avo: Broken Access Control Through Unauthorized Execution of Arbitrary Action
  Classes Across Resources"
description: "A critical Broken Access Control vulnerability was identified in the
  `ActionsController` of the Avo framework (v3.x). Due to insecure action lookup logic,
  an authenticated user can execute any Action class (descendants of `Avo::BaseAction`)
  on any resource, even if the action is not registered for that specific resource.
  This leads to Privilege Escalation and unauthorized data manipulation across the
  entire application."
