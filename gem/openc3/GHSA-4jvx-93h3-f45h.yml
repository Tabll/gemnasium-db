package_slug: "gem/openc3"
title: "OpenC3 COSMOS allows arbitrary writes to plugins directory via path-traversed
  config filenames"
description: "OpenC3 COSMOS contains a design flaw in the `save_tool_config()` function
  that allows saving tool configuration files at arbitrary locations inside the shared
  `/plugins` directory tree by supplying crafted configuration filenames. Although
  the implementation sufficiently mitigates standard path traversal attacks, by canonicalizing
  filename to an absolute path, all plugins share this same root directory. That enables
  users to create arbitrary file structures and overwrite existing configuration files
  within the shared `/plugins` directory."
