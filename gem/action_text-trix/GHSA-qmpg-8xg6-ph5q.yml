title: "Trix has a Stored XSS vulnerability through serialized attributes"
description: "The Trix editor, in versions prior to 2.1.17, is vulnerable to XSS attacks
  when a `data-trix-serialized-attributes` attribute bypasses the DOMPurify sanitizer.\n\nAn
  attacker could craft HTML containing a `data-trix-serialized-attributes` attribute
  with a malicious payload that, when the content is rendered, could execute arbitrary
  JavaScript code within the context of the user's session, potentially leading to
  unauthorized actions being performed or sensitive information being disclosed."
