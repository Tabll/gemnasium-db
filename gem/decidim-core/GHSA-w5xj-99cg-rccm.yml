title: "Decidim amendments can be accepted or rejected by anyone"
description: "The vulnerability allows any registered and authenticated user to accept
  or reject any amendments. The impact is on any users who have created proposals
  where the amendments feature is enabled. This also elevates the user accepting the
  amendment as the author of the original proposal as people amending proposals are
  provided coauthorship on the coauthorable resources."
