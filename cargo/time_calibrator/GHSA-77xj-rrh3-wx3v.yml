title: "`time_calibrator` was removed from crates.io due to malicious code"
description: "It was reported `time_calibrator` contained malicious code, that would
  try to upload `.env` files to a server.\n\nThe malicious crate had only 1 version
  published at 2026-02-28 and no evidence of actual usage. The crate was removed from
  crates.io and the user account was locked. There were no crates depending on this
  crate on crates.io.\n\nRust security response working group thanks Gabriel Silva
  for finding and reporting this, and thanks to Emily Albini for co-ordinating with
  the crates.io and infra-admin teams."
