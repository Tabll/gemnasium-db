title: "`time_calibrators` was removed from crates.io due to malicious code"
description: "The `time_calibrators` crate attempted to exfiltrate `.env` files to
  a server that was in turn impersonating the legitimate `timeapi.io` service.\n\nThe
  malicious crate had 1 version published on 2026-03-03 approximately 3 hours before
  removal and had no evidence of actual downloads. There were no crates depending
  on this crate on crates.io.\n\nRust security response working group thanks cybergeek
  for finding and reporting this, and thanks to Emily Albini for co-ordinating with
  the crates.io team."
