package_slug: "cargo/rand"
title: "Rand is unsound with a custom logger using rand::rng()"
description: "It has been reported (by @lopopolo) that the `rand` library is [unsound](https://rust-lang.github.io/unsafe-code-guidelines/glossary.html#soundness-of-code--of-a-library)
  (i.e. that safe code using the public API can cause Undefined Behaviour) when all
  the following conditions are met:\n\n- The `log` and `thread_rng` features are enabled\n-
  A [custom logger](https://docs.rs/log/latest/log/#implementing-a-logger) is defined\n-
  The custom logger accesses `rand::rng()` (previously `rand::thread_rng()`) and calls
  any `TryRng` (previously `RngCore`) methods on `ThreadRng`\n- The `ThreadRng` (attempts
  to) reseed while called from the custom logger (this happens every 64 kB of generated
  data)\n- Trace-level logging is enabled or warn-level logging is enabled and the
  random source (the `getrandom` crate) is unable to provide a new seed\n\n`TryRng`
  (previously `RngCore`) methods for `ThreadRng` use `unsafe` code to cast `*mut BlockRng<ReseedingCore>`
  to `&mut BlockRng<ReseedingCore>`. When all the above conditions are met this results
  in an aliased mutable reference, violating the Stacked Borrows rules. Miri is able
  to detect this violation in sample code. Since construction of [aliased mutable
  references is Undefined Behaviour](https://doc.rust-lang.org/stable/nomicon/references.html),
  the behaviour of optimized builds is hard to predict.\n\nAffected versions of `rand`
  are `>= 0.7, < 0.9.3` and `0.10.0`."
