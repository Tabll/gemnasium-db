package_slug: "cargo/rustls-webpki"
title: "webpki: Name constraints were accepted for certificates asserting a wildcard
  name"
description: "Permitted subtree name constraints for DNS names were accepted for certificates
  asserting a wildcard name.\n\nThis was incorrect because, given a name constraint
  of `accept.example.com`, `*.example.com` could feasibly allow a name of `reject.example.com`
  which is outside the constraint.\nThis is very similar to [CVE-2025-61727](https://go.dev/issue/76442).\n\nSince
  name constraints are restrictions on otherwise properly-issued certificates, this
  bug is reachable only after signature verification and requires misissuance to exploit."
