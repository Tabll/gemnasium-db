package_slug: "cargo/rustls-webpki"
title: "rustls-webpki: Denial of service via panic on malformed CRL BIT STRING"
description: "`bit_string_flags()` in `src/der.rs` panics with an index-out-of-bounds
  when given a BIT STRING whose content is exactly `[0x00]` (one byte: zero padding
  bits, zero data bytes). This is reachable through the public API `BorrowedCertRevocationList::from_der()`
  via the `issuingDistributionPoint` CRL extension.\n\n**Precondition**: CRL checking
  is opt-in in rustls-webpki. This vulnerability affects only applications that explicitly
  pass `RevocationOptions` to `verify_for_usage()` and load CRL bytes from a source
  the attacker can influence. The default rustls configuration (no `RevocationOptions`)
  is not affected.\n\n> **AI disclosure**: This report was prepared with AI assistance
  (Claude). The vulnerability was discovered by differential fuzzing against a formally-verified
  Rust oracle. All technical claims have been independently verified against the live
  source code before submission."
