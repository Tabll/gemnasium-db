package_slug: "cargo/rustls-webpki"
title: "webpki has a certificate revocation enforcement bug"
description: "There is a certificate revocation enforcement bug in `rustls-webpki`
  CRL processing. when both the certificate CRL distribution point and the CRL issuing
  distribution point contain multiple URI names, `IssuingDistributionPoint::authoritative_for()`
  reuses one-shot DER iterators across nested comparisons. If the only matching URI
  pair appears later in both sequences, the implementation misses the match, treats
  the CRL as non-authoritative, and under `UnknownStatusPolicy::Allow` accepts a revoked
  certificate."
