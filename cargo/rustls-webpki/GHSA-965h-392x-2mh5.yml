title: "webpki: Name constraints for URI names were incorrectly accepted"
description: "Name constraints for URI names were ignored and therefore accepted.\n\nNote
  this library does not provide an API for asserting URI names, and URI name constraints
  are otherwise not implemented.  URI name constraints are now rejected unconditionally.\n\nSince
  name constraints are restrictions on otherwise properly-issued certificates, this
  bug is reachable only after signature verification and requires misissuance to exploit."
