description: "A **Double Free / Use-After-Free (UAF)** vulnerability has been identified
  in the `IntoIter::drop` and `ThinVec::clear` implementations of the `thin_vec` crate.\nBoth
  vulnerabilities share the same root cause and can trigger memory corruption using
  only safe Rust code — no `unsafe` blocks required.\nUndefined Behavior has been
  confirmed via **Miri** and **AddressSanitizer (ASAN)**.\n\n---"
