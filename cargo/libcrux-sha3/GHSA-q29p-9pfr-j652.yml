title: "libcrux-sha3: Incorrect output from SHAKE squeeze functions"
description: "The incremental squeeze functions in the portable SHAKE XOF API, when
  attempting to squeeze more than `RATE` (168 for SHAKE128, 136 for SHAKE256) bytes,
  performed an additional permutation of the state before producing the first output
  block, thus discarding the first block of `RATE` bytes of valid XOF output."
