package_slug: "cargo/libcrux-ml-dsa"
title: "libcrux has an Incorrect Check of Signer Response Norm During Verification"
description: "The ML-DSA verification algorithm as specified in [FIPS 204, subsection
  6.3](https://nvlpubs.nist.gov/nistpubs/FIPS/NIST.FIPS.204.pdf#subsection.6.3) requires
  verifiers to check that the infinity norm of the deserialized signer response $z$
  does not exceed $\\gamma_1 - \\beta$ (line 13 of Algorithm 8). The same check is
  required to be performed during signature generation.\n\nlibcrux-ml-dsa did not
  perform this check correctly during signature verification, accepting signatures
  with signer response norm above the allowed maximum value. The check is correctly
  performed during signing."
