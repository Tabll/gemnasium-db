title: "Duplicate Advisory: Cache poisoning via insecure-by-default cache key"
description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-f93w-pcj3-rggc. This link is maintained to preserve external
  references.\n\n### Original Description\nA cache poisoning vulnerability has been
  found in the Pingora HTTP proxy framework’s default cache key construction. The
  issue occurs because the default HTTP cache key implementation generates cache keys
  using only the URI path, excluding critical factors such as the host header (authority).
  Operators relying on the default are vulnerable to cache poisoning, and cross-origin
  responses may be improperly served to users.\n\n\nImpact\n\nThis vulnerability affects
  users of Pingora's alpha proxy caching feature who relied on the default CacheKey
  implementation. An attacker could exploit this for:\n\n  *  Cross-tenant data leakage:
  In multi-tenant deployments, poison the cache so that users from one tenant receive
  cached responses from another tenant\n\n\n  *  Cache poisoning attacks: Serve malicious
  content to legitimate users by poisoning shared cache entries\n\n\n\n\nCloudflare's
  CDN infrastructure was not affected by this vulnerability, as Cloudflare's default
  cache key implementation uses multiple factors to prevent cache key poisoning and
  never made use of the previously provided default.\n\n\nMitigation:\n\nWe strongly
  recommend Pingora users to upgrade to Pingora v0.8.0 or higher, which removes the
  insecure default cache key implementation. Users must now explicitly implement their
  own callback that includes appropriate factors such as Host header, origin server
  HTTP scheme, and other attributes their cache should vary on.\n\n\nPingora users
  on previous versions may also remove any of their default CacheKey usage and implement
  their own that should at minimum include the host header / authority and upstream
  peer’s HTTP scheme."
