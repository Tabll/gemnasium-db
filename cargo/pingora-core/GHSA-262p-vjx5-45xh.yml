title: "Duplicate Advisory: HTTP Request Smuggling via HTTP/1.0 and Transfer-Encoding
  Misparsing"
description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-hj7x-879w-vrp7. This link is maintained to preserve external
  references.\n\n### Original Description\nAn HTTP Request Smuggling vulnerability
  (CWE-444) has been found in Pingora's parsing of HTTP/1.0 and Transfer-Encoding
  requests. The issue occurs due to improperly allowing HTTP/1.0 request bodies to
  be close-delimited and incorrect handling of multiple Transfer-Encoding values,
  allowing attackers to send HTTP/1.0 requests in a way that would desync Pingora’s
  request framing from backend servers’.\n\nImpact\n\nThis vulnerability primarily
  affects standalone Pingora deployments in front of certain backends that accept
  HTTP/1.0 requests. An attacker could craft a malicious payload following this request
  that Pingora forwards to the backend in order to:\n\n  *  Bypass proxy-level ACL
  controls and WAF logic\n\n\n\n\n  *  Poison caches and upstream connections, causing
  subsequent requests from legitimate users to receive responses intended for smuggled
  requests\n\n\n\n\n  *  Perform cross-user attacks by hijacking sessions or smuggling
  requests that appear to originate from the trusted proxy IP\n\n\n\n\nCloudflare's
  CDN infrastructure was not affected by this vulnerability, as its ingress proxy
  layers forwarded HTTP/1.1 requests only, rejected ambiguous framing such as invalid
  Content-Length values, and forwarded a single Transfer-Encoding: chunked header
  for chunked requests.\n\n\nMitigation:\n\nPingora users should upgrade to Pingora
  v0.8.0 or higher that fixes this issue by correctly parsing message length headers
  per RFC 9112 and strictly adhering to more RFC guidelines, including that HTTP request
  bodies are never close-delimited.\n\nAs a workaround, users can reject certain requests
  with an error in the request filter logic in order to stop processing bytes on the
  connection and disable downstream connection reuse. The user should reject any non-HTTP/1.1
  request, or a request that has invalid Content-Length, multiple Transfer-Encoding
  headers, or Transfer-Encoding header that is not an exact “chunked” string match."
