title: "Duplicate Advisory: HTTP Request Smuggling via Premature Upgrade"
description: "### Duplicate Advisory\nThis advisory has been withdrawn because it
  is a duplicate of GHSA-xq2h-p299-vjwv. This link is maintained to preserve external
  references.\n\n### Original Description\nAn HTTP request smuggling vulnerability
  (CWE-444) was found in Pingora's handling of HTTP/1.1 connection upgrades. The issue
  occurs when a Pingora proxy reads a request containing an Upgrade header, causing
  the proxy to pass through the rest of the bytes on the connection to a backend before
  the backend has accepted the upgrade. An attacker can thus directly forward a malicious
  payload after a request with an Upgrade header to that backend in a way that may
  be interpreted as a subsequent request header, bypassing proxy-level security controls
  and enabling cross-user session hijacking.\n\nImpact\n\nThis vulnerability primarily
  affects standalone Pingora deployments where a Pingora proxy is exposed to external
  traffic. An attacker could exploit this to:\n\n  *  Bypass proxy-level ACL controls
  and WAF logic\n\n\n\n\n  *  Poison caches and upstream connections, causing subsequent
  requests from legitimate users to receive responses intended for smuggled requests\n\n\n\n\n
  \ *  Perform cross-user attacks by hijacking sessions or smuggling requests that
  appear to originate from the trusted proxy IP\n\n\n\n\nCloudflare's CDN infrastructure
  was not affected by this vulnerability, as ingress proxies in the CDN stack maintain
  proper HTTP parsing boundaries and do not prematurely switch to upgraded connection
  forwarding mode.\n\n\nMitigation:\n\nPingora users should upgrade to Pingora v0.8.0
  or higher\n\n\nAs a workaround, users may return an error on requests with the Upgrade
  header present in their request filter logic in order to stop processing bytes beyond
  the request header and disable downstream connection reuse."
