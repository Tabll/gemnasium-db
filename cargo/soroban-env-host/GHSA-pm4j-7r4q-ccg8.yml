package_slug: "cargo/soroban-env-host"
title: "Soroban: Muxed address<->ScVal conversions may break after a conversion failure"
description: "Soroban host ensures that `MuxedAddress` objects can't be used as storage
  keys in order to proactively prevent the contract logic bugs. However, due to a
  bug in Soroban host implementation, a failure in `Val`->`ScVal` conversion during
  the storage key computation will have the flag indicating that storage conversion
  is happening stuck in the `true` state until the next storage access. While the
  flag is stuck in `true` state, any `MuxedAddress` object conversions to `ScVal`
  will fail, i.e. a failure will occur if a `MuxedAddress` is emitted in the event
  or is serialized to XDR via a host function."
