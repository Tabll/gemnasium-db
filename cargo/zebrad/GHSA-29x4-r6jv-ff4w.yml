title: "Zebra Vulnerable to Denial of Service via Interrupted JSON-RPC Requests from
  Authenticated Clients"
description: "A vulnerability in Zebra's JSON-RPC HTTP middleware allows an authenticated
  RPC client to cause a Zebra node to crash by disconnecting before the request body
  is fully received. The node treats the failure to read the HTTP request body as
  an unrecoverable error and aborts the process instead of returning an error response."
