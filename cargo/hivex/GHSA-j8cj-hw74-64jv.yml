title: "Hive has Double-free and Use After Free Vulnerabilities"
description: "`Drop` implementation for `Hive` did perform free, but so did `Hive::close`,
  which, at the end of the scope performed `Drop`, therefore triggering double-free.\n\nAdditionally,
  function `Hive::from_handle` was not marked as unsafe, making it, in combination
  with `as_handle` easy to clone and trigger double-free in safe code or triggering
  UB when using invalid pointer."
