title: "actix-web-lab has host header poisoning in redirect middleware can generate
  attacker-controlled absolute redirects"
description: "`actix-web-lab` redirect middleware uses request-derived host information
  to construct absolute redirect URLs (for example, `https://{hostname}{path}`). In
  deployments without strict host allowlisting, an attacker can supply a malicious
  Host header and poison the `Location` response header, causing open redirect/phishing
  behavior."
