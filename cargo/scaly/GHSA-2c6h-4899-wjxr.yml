title: "scaly: Multiple soundness issues in Rust safe APIs"
description: "Affected versions contain multiple safe APIs that can trigger undefined
  behavior:\n\n- `Array<T>::index` can perform an out-of-bounds read.\n- `String::get_length`
  can perform an out-of-bounds read.\n- `String::append_character` can perform an
  invalid write.\n- `String::to_c_string` can perform an out-of-bounds write.\n\nThese
  issues were reproduced against `scaly` 0.0.37 under Miri. The crate is unmaintained."
