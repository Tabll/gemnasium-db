package_slug: "cargo/zeptoclaw"
title: "zeptoclaw has Shell allowlist-blocklist bypass via command/argument injection
  and file name wildcards"
description: "[zeptoclaw](https://github.com/qhkm/zeptoclaw) implements a allowlist
  combined with a blocklist to prevent malicious shell commands in [src/security/shell.rs](https://github.com/qhkm/zeptoclaw/blob/v0.5.8/src/security/shell.rs).
  However, even in the `Strict` mode, attackers can completely bypass all the guards
  from allowlist and blocklist:\n\n- to bypass the `allowlist`, command injection
  is enough, such as `;`, `$()` etc.\n- to bypass the `REGEX_BLOCKED_PATTERNS`, argument
  injection is enough, such as the `python3 -P -c \"...\"`\n- to bypass the `LITERAL_BLOCKED_PATTERNS`,
  file name wildcards can do the work, such as `cat /etc/pass[w]d`"
