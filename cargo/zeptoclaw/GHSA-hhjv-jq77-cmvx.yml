title: "zeptoclaw has Android device shell blocklist bypass via argument permutation"
description: "[zeptoclaw](https://github.com/qhkm/zeptoclaw) implements a [blocklist](https://github.com/qhkm/zeptoclaw/blob/fe2ef07cfec5bb46b42cdd65f52b9230c03e9270/src/tools/android/actions.rs#L413-L424)
  to prevent dangerous commands running in android device shell, but this blocklist
  has several blocked commands with argements in the pattern literal, such as `rm
  -f` and `rm -rf`, this can be simply bypassed by using different orders for these
  arguments, such as `rm -r -f` or `rm -fr` etc."
