title: "gitoxide: CommandForbiddenInModulesConfiguration Bypass in gix_submodule::File::update()
  Enables Arbitrary Command Execution via .gitmodules"
description: "[`gix_submodule::File::update()`](https://github.com/GitoxideLabs/gitoxide/blob/main/gix-submodule/src/access.rs#L168)
  is the API that gates whether an attacker-supplied `.gitmodules` file may set `update
  = !<shell command>`. The function is designed to return `Err(CommandForbiddenInModulesConfiguration)`
  unless the `!command` value came from a trusted local source (`.git/config`). Git
  CVE [CVE-2019-19604](https://nvd.nist.gov/vuln/detail/cve-2019-19604) illustrates
  why this check is necessary.\n\nHowever, the guard is implemented incorrectly: it
  checks whether any section with the same submodule name exists from a non-`.gitmodules`
  source; it does not verify that the `update` value came from that section.\n\nOnce
  a submodule has been initialized (any workflow that writes `submodule.<name>.url`
  to `.git/config`), and the attacker subsequently adds `update = !cmd` to `.gitmodules`,
  the guard passes while the command value falls through to the attacker-controlled
  file.\n\nOn an identical repository state, `git submodule update` aborts with `fatal:
  invalid value for 'submodule.sub.update'`, while `gix::Submodule::update()` returns
  `Ok(Some(Update::Command(\"touch /tmp/pwned\")))`.\n\nThe vulnerable code was introduced
  in https://github.com/GitoxideLabs/gitoxide/commit/6a2e6a436f76c8bbf2487f9967413a51356667a0."
