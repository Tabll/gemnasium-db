title: "gix and gitoxide: unvalidated submodule name traverses out of .git/modules
  and redirects state() / open() to another repository"
description: "attachments:\n[pocs.zip](https://github.com/user-attachments/files/26431422/pocs.zip)\n\nSubmodule
  names coming from `.gitmodules` are exposed as unvalidated names and are later reused
  to derive the submodule git directory as:\n\n```\n<superproject common_dir>/modules/<submodule
  name>\n```\n\nBecause the submodule name is joined directly as a filesystem path
  component, a name such as `../../../escaped-target.git` escapes `.git/modules` after
  normalization. The current implementation then uses that escaped path in both `state()`
  and `open()`.\n\nThe updated PoC demonstrates the real sink, not just string construction:\n\n-
  `state()` reports `repository_exists=true` for the traversed path;\n- `open()` returns
  a repository whose normalized `common_dir()` matches the attacker-chosen repository
  outside `.git/modules`."
