description: "This is part of an ongoing campaign to attempt to typosquat crates in
  the [`polymarket-client-sdk`](https://crates.io/crates/polymarket-client-sdk) ecosystem
  to exfiltrate user credentials.\n\nThe malicious crate had 1 version published on
  2026-02-24 approximately 4 hours before removal and had no evidence of actual downloads.
  There were no crates depending on this crate on crates.io.\n\nThe crates.io team
  advises anyone developing with Polymarket to review dependencies carefully. We are
  investigating ways to mitigate this attacker who appears to be very motivated to
  steal Polymarket credentials."
