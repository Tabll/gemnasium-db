title: "libcrux has All-Zero Key Generation Upon Catastrophic RNG Failure"
description: "The libcrux-ed25519 key generation samples Ed25519 secret keys from
  a provided CSPRNG in a loop for up to 100 attempts until a non-zero key is found.
  \ If a non-zero key could not be sampled within 100 attempts the key generation
  function would silently continue with an all-zero buffer as the secret key."
