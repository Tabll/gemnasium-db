title: "gix and gitoxide's symlinked .gitmodules are followed and parsed from outside
  of the repository"
description: "attachments:\n[pocs.zip](https://github.com/user-attachments/files/26431422/pocs.zip)\n\n\nWhen
  `Repository::submodules()` loads submodule metadata, it prefers the worktree `.gitmodules`
  file if that path exists. In the current implementation, the path is read with `std::fs::read()`,
  which follows symlinks. As a result, a repository can present a symlinked `.gitmodules`
  that points outside the repository, and gitoxide will parse the out-of-repository
  bytes as submodule configuration.\n\nThis is a repository-boundary violation. A
  caller using the high-level submodule API can believe it is reading repository-local
  submodule metadata, while the bytes are actually coming from an arbitrary file outside
  the repository tree."
