package_slug: "packagist/pocketmine/pocketmine-mp"
title: "PocketMine-MP: JSON decoding of unlimited size large arrays/objects in ModalFormResponse
  Handling"
description: "The server does not meaningfully limit the size of the JSON payload
  in `ModalFormResponsePacket`. This can be abused by an attacker to waste memory
  and CPU on an affected server, e.g. by sending arrays with millions of elements.\n\nThe
  player must have a full session on the server (i.e. spawned in the world) to exploit
  this, as form responses are not handled unless the player is in game."
