title: "PocketMine-MP: Network amplification vulnerability with `ActorEventPacket`"
description: "The server handles `ActorEventPacket` to trigger consuming animations
  from vanilla clients when they eat food or drink potions.\n\nThis can be abused
  to make the server spam other clients, and to waste server CPU and memory. For every
  `ActorEventPacket` sent by the client, an animation event will be sent to every
  other player the attacker is visible to.\n\nThis is similar to various other vulnerabilities
  which were fixed in the network overhaul of PM4 (e.g. `AnimatePacket` and `LevelSoundEventPacket`),
  but somehow this one slipped through the net."
