package_slug: "packagist/pocketmine/pocketmine-mp"
title: "PocketMine-MP: LogDoS by large complex unknown property logging in clientData
  in LoginPacket"
description: "Attackers can put large and/or complex structures as a value to an unknown
  property in the clientData JWT body in the Minecraft `LoginPacket`, causing the
  server to generate very long log messages.\nAdditionally, the property name is logged
  without any length limitations or sanitization, which can also be abused for LogDoS.\n\nThis
  may be used to spam the log/console, waste CPU time serializing the offending structure,
  and potentially to crash the server entirely.\n\nThis happens because the JsonMapper
  instance used to process the JWT body is configured to warn on unexpected properties
  instead of rejecting them outright. While this behaviour increases flexibility for
  random changes introduced by Microsoft, it also creates vulnerabilities if not handled
  carefully.\n\nThis vulnerability affects PocketMine-MP servers exposed to a public
  network where unknown actors may have access."
