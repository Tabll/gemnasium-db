title: "Kimai leaks API Token Hash via Invoice Twig Template"
description: "The Twig sandbox used for invoice templates blocks certain sensitive
  `User` methods (password, TOTP secret, etc.) via a blocklist in `StrictPolicy::checkMethodAllowed()`.
  However, `getApiToken()` and `getPlainApiToken()` are not on the blocklist. An admin
  who creates an invoice template can embed calls to these methods, causing the bcrypt
  or sodium hashed API password of any user who generates an invoice using that template
  to be included in the rendered output.\n\nOnly relevant for OnPremise installations
  with template upload activated."
