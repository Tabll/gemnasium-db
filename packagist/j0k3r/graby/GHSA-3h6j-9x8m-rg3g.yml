title: "Graby has stored XSS via iframe srcdoc Attribute in htmLawed Sanitization
  Config"
description: "Graby's `cleanupXss()` function configures htmLawed with conflicting
  settings: `safe=1` (which removes `<iframe>`) combined with `'elements' => '*+iframe-meta'`
  (which re-enables `<iframe>`). htmLawed does not sanitize the `srcdoc` attribute,
  allowing injection of arbitrary JavaScript that executes when the content is rendered
  via `|raw` in templates."
