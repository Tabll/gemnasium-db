title: "rhukster/dom-sanitizer: SVG <style> tag allows CSS injection via unfiltered
  url() and @import directives"
description: "DOMSanitizer::sanitize() allows <style> elements in SVG content but
  never inspects their text content. CSS url() references and @import rules pass through
  unfiltered, causing the browser to issue HTTP requests to attacker-controlled hosts
  when the sanitized SVG is rendered."
