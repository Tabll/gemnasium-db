title: "AzuraCast: RCE via Liquidsoap string interpolation injection in station metadata
  and playlist URLs"
description: "AzuraCast's `ConfigWriter::cleanUpString()` method fails to sanitize
  Liquidsoap string interpolation sequences (`#{...}`), allowing authenticated users
  with `StationPermissions::Media` or `StationPermissions::Profile` permissions to
  inject arbitrary Liquidsoap code into the generated configuration file. When the
  station is restarted and Liquidsoap parses the config, `#{...}` expressions are
  evaluated, enabling arbitrary command execution via Liquidsoap's `process.run()`
  function."
