title: "AzuraCast's Missing RequireInternalConnection on Liquidsoap API Allows Low-Privilege
  Metadata Injection and Broadcast Disruption"
description: "The `/api/internal/{station_id}/liquidsoap/{action}` endpoint is accessible
  from the public web interface because it lacks the `RequireInternalConnection` middleware
  that protects other internal endpoints (`/sftp-auth`, `/sftp-event`). Combined with
  a logic flaw where the `$asAutoDj` flag is set based on the *presence* of the `X-Liquidsoap-Api-Key`
  header rather than its *validated value*, any user with the basic `View` station
  permission can invoke privileged Liquidsoap commands — injecting arbitrary now-playing
  metadata visible to all listeners, disrupting live broadcast tracking, and disclosing
  absolute filesystem paths."
