title: "EC-CUBE has a Vulnerability that Allows MFA Bypass in the Administrative Interface"
description: "# Vulnerability Allowing MFA Bypass\n\n## Affected EC-CUBE Versions\nVersions:
  4.1.0 – 4.3.1\n\n## Vulnerability Overview\nIf an administrator’s ID and password
  are compromised, an issue exists that allows an attacker to bypass the normally
  required two-factor authentication (2FA) and log in to the administrative interface.\n\n##
  Severity and Impact\n\n**CVSS v3.1 score**  \nBase score: 6.2 / Temporal score:
  5.7 / Environmental score (after mitigation and countermeasures): 0.0\n\nAn attacker
  can forcibly overwrite the 2FA configuration of an account with administrative privileges.
  As a result, the legitimate administrator can be locked out, while the attacker
  can log in to the administrative interface and perform unauthorized actions such
  as viewing sensitive information or tampering with the website.\n\n## Root Cause
  Details\n\nThere are flaws in the access control implementation for the 2FA settings
  page (`/admin/two_factor_auth/set`).\n\n1. **TwoFactorAuthListener.php**  \n   The
  route for the 2FA settings page (`admin_two_factor_auth_set`) is included in the
  list of routes excluded from the 2FA authentication check.\n\n2. **TwoFactorAuthController.php**
  \ \n   Even for users who already have 2FA configured, the implementation allows
  reconfiguration (overwriting) of the 2FA secret key without passing 2FA authentication.\n\n##
  Attack Preconditions and Steps\n\n**Preconditions:**\n- The attacker knows the administrative
  user’s ID and password.\n- 2FA is enabled for that user.\n\n**Attack Steps:**\n1.
  Attempt to log in using the ID and password.\n2. When the 2FA code entry screen
  is displayed, do not enter a code; instead, directly modify the URL to access `/admin/two_factor_auth/set`.\n3.
  Because access is not denied, the attacker can generate and save (overwrite) a new
  2FA secret key.\n\n\n# MFAバイパスが可能な脆弱性\n\n## EC-CUBEバージョン\nバージョン:  4.1.0 ~ 4.3.1"
