package_slug: "packagist/craftcms/cms"
title: "Craft CMS: Authorized asset \"preview file\" requests bypass allows users
  without asset access to retrieve private preview metadata"
description: "An authenticated low-privileged user can call `assets/preview-file`
  for an asset they are not authorized to view and still receive preview response
  data (`previewHtml`) for that private asset.\n\nThe returned preview HTML included
  a private preview image route containing the target private `assetId`, even though
  `canView` was `false` for the attacker account."
