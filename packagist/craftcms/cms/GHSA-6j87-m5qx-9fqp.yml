title: "Craft CMS has Stored XSS in Table Field in its \"Row Heading\" Column Type"
description: "A stored Cross-site Scripting (XSS) vulnerability exists in the `editableTable.twig`
  component when using the `Row Heading` column type. The application fails to sanitize
  input within row headings, allowing an attacker to execute arbitrary JavaScript
  when another user views a page with the malicious table field."
