  allowing an attacker to execute arbitrary JavaScript when another user views or
  edits a user's permissions.\n\n> [!NOTE]\n> This is a separate vulnerability from
  the previously reported \"[Stored XSS via User Group Name in User Settings Page](https://github.com/craftcms/cms/security/advisories/GHSA-2423-8xxj-wc3g)\"
  and \"[Multiple Stored XSS in User Group Edit Page](https://github.com/craftcms/cms/security/advisories/GHSA-vx7g-xw92-g4xj)\".
