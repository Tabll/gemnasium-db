title: "livewire-markdown-editor has arbitrary file upload that allows stored XSS
  via attachment handler"
description: "All versions of `mckenziearts/livewire-markdown-editor` prior to **v1.3**
  contain a critical arbitrary file upload vulnerability in the `MarkdownEditor::updatedAttachments()`
  Livewire handler. The handler calls `$file->store()` with no server-side validation
  of MIME type, extension, or file content.\n\nAny authenticated user with access
  to a page embedding `<livewire:markdown-editor>` can upload files of any type (`.html`,
  `.svg`, `.js`, `.php`, `.exe`, etc.) to the disk configured by `livewire-markdown-editor.disk`.
  When that disk is a public cloud bucket (S3, DigitalOcean Spaces, Cloudflare R2,
  Scaleway Object Storage — the common configuration when `FILESYSTEM_DISK` points
  to such a disk), uploaded files are served publicly with a guessed `Content-Type`
  header.\n\nThe consequences include:\n\n- **Stored XSS** on the storage domain via
  uploaded `.html` or `.svg` files\n- **Phishing page hosting** on the application's
  own storage domain (trust laundering)\n- **Malware distribution** from a domain
  users associate with the application\n- **Markdown injection** in the editor output
  via crafted filenames (the client-supplied `getClientOriginalName()` value was inserted
  verbatim into the markdown)\n\nA real-world exploitation of this vulnerability was
  observed in production on a community platform using this package."
