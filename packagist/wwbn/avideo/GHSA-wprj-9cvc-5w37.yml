title: "AVideo: Unauthenticated Access to Payment Log DataTables Endpoints Exposes
  Transaction Data, PayPal Tokens, and User Financial Records"
description: "Multiple payment plugin `list.json.php` endpoints lack authentication
  and authorization checks, allowing unauthenticated attackers to retrieve all payment
  transaction records including PayPal billing agreement IDs, Express Checkout tokens,
  Authorize.Net webhook payloads with transaction details, and Bitcoin payment records.
  This is the same class of vulnerability fixed in the Scheduler plugin (GHSA-j724-5c6c-68g5
  / commit 83390ab1f) but the fix was not applied to the remaining 21 affected endpoints."
