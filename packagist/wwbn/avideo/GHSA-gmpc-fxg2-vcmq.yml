title: "AVideo has Stored XSS via Unescaped Menu Item Fields in TopMenu Plugin"
description: "The TopMenu plugin renders menu item fields (icon classes, URLs, and
  text labels) directly into HTML without applying `htmlspecialchars()` or any other
  output encoding. Since menu items are rendered on every public page through plugin
  hooks, a single malicious menu entry results in stored cross-site scripting that
  executes for every visitor to the site. An admin user who is tricked into saving
  a crafted menu item (or an attacker who gains admin access) can compromise all site
  visitors."
