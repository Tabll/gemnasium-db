title: "AVideo has an Unauthenticated Local File Inclusion in API locale (RCE possible
  with writable PHP)"
description: "An unauthenticated API endpoint (`APIName=locale`) concatenates user
  input into an `include` path with no canonicalization or `whitelist`. Path traversal
  is accepted, so arbitrary PHP files under the web root can be included. In our test
  this yielded confirmed file disclosure and code execution of existing PHP content
  (e.g., `view/about.php`), and it *can* escalate to RCE if an attacker can place
  or control a PHP file elsewhere in the tree."
