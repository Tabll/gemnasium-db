title: "WWBN AVideo has a SSRF via same-domain hostname with alternate port bypasses
  isSSRFSafeURL"
description: "The `isSSRFSafeURL()` function in `objects/functions.php` contains a
  same-domain shortcircuit (lines 4290-4296) that allows any URL whose hostname matches
  `webSiteRootURL` to bypass all SSRF protections. Because the check compares only
  the hostname and ignores the port, an attacker can reach arbitrary ports on the
  AVideo server by using the site's public hostname with a non-standard port. The
  response body is saved to a web-accessible path, enabling full exfiltration."
