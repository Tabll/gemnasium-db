description: "The endpoint `plugin/Live/view/Live_restreams/list.json.php` contains
  an Insecure Direct Object Reference (IDOR) vulnerability that allows any authenticated
  user with streaming permission to retrieve other users' live restream configurations,
  including third-party platform stream keys and OAuth tokens (access_token, refresh_token)
  for services like YouTube Live, Facebook Live, and Twitch."
