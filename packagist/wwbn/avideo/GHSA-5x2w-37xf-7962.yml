title: "AVideo has Unauthenticated PGP Message Decryption via Public Endpoint"
description: "The AVideo platform exposes a publicly accessible endpoint that performs
  server-side PGP decryption without requiring any form of authentication. Any anonymous
  user can submit a private key, ciphertext, and passphrase to the endpoint and receive
  the decrypted plaintext in the JSON response. This functionality is entirely unprotected,
  meaning no session, token, or credential is needed to invoke it."
