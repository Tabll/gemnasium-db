title: "Froxlor has a Reseller Domain Quota Bypass via Unvalidated adminid Parameter
  in Domains.add()"
description: "In `Domains.add()`, the `adminid` parameter is accepted from user input
  and used without validation when the calling reseller does not have the `customers_see_all`
  permission. This allows a reseller to attribute newly created domains to any other
  admin, bypassing their own domain quota (since the wrong admin's `domains_used`
  counter is incremented) and potentially exhausting another admin's quota."
