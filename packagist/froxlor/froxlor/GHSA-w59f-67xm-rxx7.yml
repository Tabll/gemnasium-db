title: "Froxlor has Local File Inclusion via path traversal in API `def_language`
  parameter leads to Remote Code Execution"
description: "The Froxlor API endpoint `Customers.update` (and `Admins.update`) does
  not validate the `def_language` parameter against the list of available language
  files. An authenticated customer can set `def_language` to a path traversal payload
  (e.g., `../../../../../var/customers/webs/customer1/evil`), which is stored in the
  database. On subsequent requests, `Language::loadLanguage()` constructs a file path
  using this value and executes it via `require`, achieving arbitrary PHP code execution
  as the web server user."
