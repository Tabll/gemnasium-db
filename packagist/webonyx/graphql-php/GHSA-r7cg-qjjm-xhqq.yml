title: "webonyx/graphql-php has unbounded recursion in parser that causes stack overflow
  on crafted nested input"
description: "`GraphQL\\Language\\Parser` is a recursive descent parser with no recursion
  depth limit and no `zend.max_allowed_stack_size` interaction. Crafted nested queries
  trigger a SIGSEGV in the PHP runtime, killing the FPM/CLI worker process. Smallest
  crashing payload is approximately 74 KB."
