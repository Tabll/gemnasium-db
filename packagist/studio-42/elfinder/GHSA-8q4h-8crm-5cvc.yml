title: "elFinder: Command injection in resize background color parameter when using
  ImageMagick CLI"
description: "elFinder contains a command injection vulnerability in the `resize`
  command.\n\nThe `bg` (background color) parameter is accepted from user input and
  passed through image resize/rotate processing. In configurations that use the ImageMagick
  CLI backend, this value is incorporated into shell command strings without sufficient
  escaping. An attacker able to invoke the `resize` command with a crafted `bg` value
  may achieve arbitrary command execution as the web server process user.\n\nThis
  issue affects configurations where:\n- the `resize` command is enabled,\n- image
  processing uses the ImageMagick CLI backend, and\n- the vulnerable code paths are
  reachable."
